// ─── MLB API Fetch ───
const MLB_API="https://statsapi.mlb.com/api/v1";

async function fetchMLBGames(dateStr){
  // 1. Get schedule with linescore & decisions
  const schRes=await fetch(`${MLB_API}/schedule?date=${dateStr}&sportId=1&hydrate=linescore,decisions`);
  const sch=await schRes.json();
  if(!sch.dates||!sch.dates.length)return[];
  const gamesRaw=sch.dates[0].games.filter(g=>g.status.detailedState==="Final"||g.status.detailedState.startsWith("Completed"));

  // 2. For each game, fetch boxscore + playByPlay in parallel
  const results=await Promise.all(gamesRaw.map(async g=>{
    const[boxRes,pbpRes]=await Promise.all([
      fetch(`${MLB_API}/game/${g.gamePk}/boxscore`),
      fetch(`${MLB_API}/game/${g.gamePk}/playByPlay`)
    ]);
    const box=await boxRes.json();
    const pbp=await pbpRes.json();

    const awayId=g.teams.away.team.id,homeId=g.teams.home.team.id;
    const ls=g.linescore;

    // Innings
    const innings=(ls?.innings||[]).map(inn=>({
      num:inn.num,
      away:inn.away?.runs??0,
      home:inn.home?.runs??0
    }));

    // Starting pitchers (first in pitchers array)
    const extractSP=(side)=>{
      const t=box.teams[side];
      const spId=t.pitchers?.[0];
      if(!spId)return null;
      const p=t.players?.["ID"+spId];
      if(!p)return null;
      const s=p.stats?.pitching||{};
      return{
        name:p.person?.fullName||"?",
        ip:s.inningsPitched||"0",h:s.hits||0,r:s.runs||0,er:s.earnedRuns||0,
        bb:s.baseOnBalls||0,so:s.strikeOuts||0,hr:s.homeRuns||0,
        pitches:s.numberOfPitches||0,strikes:s.strikes||0
      };
    };

    // Home runs from play-by-play
    const homeRuns=(pbp.allPlays||[])
      .filter(p=>p.result?.event==="Home Run")
      .map(p=>p.result?.description||"");

    // Decisions
    const dec=g.decisions||{};

    return{
      id:"mlb-"+g.gamePk,
      date:dateStr,
      away:teamZh(awayId),home:teamZh(homeId),
      awayEn:teamEn(awayId),homeEn:teamEn(homeId),
      awayScore:ls?.teams?.away?.runs??0,
      homeScore:ls?.teams?.home?.runs??0,
      awayHits:ls?.teams?.away?.hits??0,homeHits:ls?.teams?.home?.hits??0,
      awayErrors:ls?.teams?.away?.errors??0,homeErrors:ls?.teams?.home?.errors??0,
      innings,
      spAway:extractSP("away"),spHome:extractSP("home"),
      winner:dec.winner?.fullName||"",loser:dec.loser?.fullName||"",
      save:dec.save?.fullName||"",
      homeRuns,
      note:"",
      createdAt:new Date().toISOString()
    };
  }));
  return results;
}

// OCR.space cht 模型偶爾會輸出簡/日文變體字（視覺幾乎相同但 Unicode 不同）
// 例：匹茲堡海"盜"(U+76DC) 被讀成 "盗"(U+76D7) → includes() 比對失敗
// 這張表只包含 MLB 球隊名稱會用到的字
const HANT_NORM={"盗":"盜","响":"響","酿":"釀","红":"紅","袜":"襪","鸟":"鳥","蓝":"藍","莺":"鶯","护":"護","双":"雙","苏":"蘇","达":"達","奥":"奧","兰":"蘭","图":"圖","骑":"騎","会":"會","亚":"亞","费":"費","迈":"邁","马":"馬","鱼":"魚","国":"國","圣":"聖","旧":"舊","纽":"紐","约":"約","湾":"灣","尔":"爾","区":"區","卫":"衛","号":"號","队":"隊","义":"義","让":"讓","总":"總","赛":"賽","场":"場","时":"時","间":"間","选":"選","数":"數","胜":"勝","负":"負","号":"號"};
function normalizeHant(s){return s.split("").map(c=>HANT_NORM[c]||c).join("")}

function twTeam(name){
  if(!name)return"";
  name=normalizeHant(name);
  // Try exact match first
  if(TW_TEAM[name])return TW_TEAM[name];
  // Try partial match (e.g., "洛杉磯道奇 -2.5" → "道奇")
  for(const[k,v]of Object.entries(TW_TEAM)){
    if(name.includes(k))return v;
  }
  return name;
}

// ─── 圖片壓縮：縮短邊到 1600px、JPEG quality 0.85
// OCR.space 免費 1MB 上限，手機截圖普遍 2-5MB，不壓縮會 "Failed to fetch"
async function compressImage(file,maxSide=1600,quality=0.85){
  const dataUrl=await new Promise((ok,fail)=>{
    const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=fail;r.readAsDataURL(file);
  });
  const img=await new Promise((ok,fail)=>{
    const i=new Image();i.onload=()=>ok(i);i.onerror=fail;i.src=dataUrl;
  });
  const scale=Math.min(1,maxSide/Math.max(img.width,img.height));
  const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
  const canvas=document.createElement("canvas");
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h); // 白底避免透明 JPEG 變黑
  ctx.drawImage(img,0,0,w,h);
  return canvas.toDataURL("image/jpeg",quality);
}

// ─── OCR via OCR.space (free 25K/month) ───
// OCR.space 2026/04 起不再回 Access-Control-Allow-Origin，瀏覽器直連會被 CORS 擋
// 策略：先試直連，失敗則走 cors.eu.org proxy 轉發
const OCR_DIRECT_URL="https://api.ocr.space/parse/image";
const OCR_PROXY_URL="https://cors.eu.org/https://api.ocr.space/parse/image";

async function ocrImage(base64WithPrefix,apiKey){
  const approxBytes=(base64WithPrefix.length-base64WithPrefix.indexOf(",")-1)*0.75;
  if(approxBytes>1024*1024)throw new Error(`圖片壓縮後仍 ${(approxBytes/1024/1024).toFixed(2)}MB，超過 OCR.space 免費 1MB 限制`);
  const buildForm=()=>{
    const f=new FormData();
    f.append("apikey",apiKey);
    f.append("base64Image",base64WithPrefix);
    f.append("language","cht");
    f.append("isOverlayRequired","false");
    f.append("OCREngine","2");
    return f;
  };
  const callOnce=async(url)=>{
    const res=await fetch(url,{method:"POST",body:buildForm()});
    if(!res.ok){
      let msg=`OCR API ${res.status}`;
      try{const t=await res.text();if(t)msg+=`: ${t.slice(0,200)}`}catch{}
      throw new Error(msg);
    }
    const data=await res.json();
    if(data.IsErroredOnProcessing)throw new Error(data.ErrorMessage?.[0]||"OCR 處理失敗");
    return(data.ParsedResults||[]).map(r=>r.ParsedText||"").join("\n");
  };
  try{
    return await callOnce(OCR_DIRECT_URL);
  }catch(e){
    // 只有網路層失敗（TypeError: Failed to fetch）才走 proxy；API 錯誤不重試
    const isNetworkFail=e instanceof TypeError||/Failed to fetch|Network/i.test(e.message||"");
    if(!isNetworkFail)throw e;
    try{
      return await callOnce(OCR_PROXY_URL);
    }catch(e2){
      throw new Error(`直連與 CORS proxy 都失敗: ${e2.message||e2}`);
    }
  }
}

// ─── Parse OCR text into structured bets ───
// OCR.space reads multi-column images left-to-right, so:
//   - Matchup lines and selection headers appear in leg order
//   - Odds appear as standalone decimals (e.g., "1.90") also in leg order
//   - We match them by index
function parseOcrText(fullText){
  const lines=fullText.split(/[\n\r]+/).map(l=>l.trim()).filter(Boolean);

  // 1. Find all matchup anchors: "number team @ team"
  const anchors=[];
  for(let i=0;i<lines.length;i++){
    const m=lines[i].match(/(\d+)\s+(.+?)\s*[@＠]\s*(.+)/);
    if(m)anchors.push({li:i,awayFull:m[2].trim(),homeFull:m[3].trim()});
  }

  // 2. Find all standalone odds (lines that are just a decimal like "1.90", "2.10")
  const allOdds=[];
  for(const ln of lines){
    if(ln.match(/^\d+\.\d{1,2}$/)&&Number(ln)>=1&&Number(ln)<20)allOdds.push(Number(ln));
  }

  // 3. Find all bet markers with line indices
  const legsMap={"兩關":2,"三關":3,"四關":4,"五關":5,"單場":1};
  const betMarkers=[];
  for(let i=0;i<lines.length;i++){
    const m=lines[i].match(/^(兩關|三關|四關|五關|單場)$/);
    if(m)betMarkers.push({li:i,count:legsMap[m[1]]||1});
  }

  // 4. Find all NTD amounts (every other one is bet amount, alternating with payout)
  const ntdAll=[...fullText.matchAll(/NTD\s*(\d+)/gi)].map(m=>Number(m[1]));

  // 5. For each anchor, look backwards to find date, market, selection header
  const parsedLegs=anchors.map((a,idx)=>{
    let market="normal",lineVal="",gameDate="",selectionText="";

    for(let j=a.li-1;j>=Math.max(0,a.li-12);j--){
      const ln=lines[j];

      // Stop at another matchup or bet marker
      if(j<a.li-1&&ln.match(/\d+\s+.+[@＠]/))break;
      if(ln.match(/^(兩關|三關|四關|五關|單場)$/))break;

      // Market (check if team total by looking for team name in the same line as 大小)
      const handiM=ln.match(/讓分\s*([-\d.]+)/);
      const totalM=ln.match(/大小\s*([\d.]+)/);
      if(ln.includes("勝分差")){market="margin"}
      else if(handiM){market="handi";lineVal=handiM[1]}
      else if(totalM){
        lineVal=totalM[1];
        const awayS=twTeam(a.awayFull),homeS=twTeam(a.homeFull);
        const allHome=[a.homeFull,homeS,...Object.entries(TW_TEAM).filter(([,v])=>v===homeS).map(([k])=>k)];
        const allAway=[a.awayFull,awayS,...Object.entries(TW_TEAM).filter(([,v])=>v===awayS).map(([k])=>k)];
        if(allHome.some(n=>n&&ln.includes(n)))market="team_total_home";
        else if(allAway.some(n=>n&&ln.includes(n)))market="team_total_away";
        else market="total";
      }
      else if(ln.includes("不讓分")){market="normal"}

      // Game date (take the LAST one found going backwards = closest to matchup)
      if(!gameDate){
        const dm=ln.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
        if(dm)gameDate=`${dm[1]}-${String(dm[2]).padStart(2,"0")}-${String(dm[3]).padStart(2,"0")}`;
      }

      // Selection header: the line with team name or 大/小 (not a keyword/market/date line)
      if(!selectionText){
        const cleaned=ln.replace(/^[：（◎C\s:()○●·＠]+/,"").trim();
        if(cleaned&&
          !cleaned.match(/^\d{4}[\/\-]/)&&
          !cleaned.match(/^(聯盟|美國|玩法|賽事|投注|NTD|未派彩|可能|兩關|三關|四關|五關|單場)/)&&
          !cleaned.match(/^不讓分/)&&
          !cleaned.match(/^讓分/)&&
          !cleaned.match(/大小/)&&
          !cleaned.match(/^勝分差/)&&
          !cleaned.match(/^[\[［]/)&&
          !cleaned.match(/^\d+\.\d{1,2}$/)&&
          !cleaned.match(/^[\d]+$/)&&
          !cleaned.match(/^投注/)&&
          !cleaned.match(/^325|^286/)){
          selectionText=cleaned;
        }
      }
    }

    // Determine selection
    const awayShort=twTeam(a.awayFull);
    const homeShort=twTeam(a.homeFull);
    let selection="";

    // Build team name check lists
    const checkHome=[a.homeFull,homeShort].concat(
      Object.entries(TW_TEAM).filter(([,v])=>v===homeShort).map(([k])=>k)
    );
    const checkAway=[a.awayFull,awayShort].concat(
      Object.entries(TW_TEAM).filter(([,v])=>v===awayShort).map(([k])=>k)
    );
    const homeInSel=checkHome.some(n=>n&&selectionText.includes(n));
    const awayInSel=checkAway.some(n=>n&&selectionText.includes(n));

    if(market==="margin"){
      // Margin: selectionText like "底特律老虎 1分" / "底特律老虎 > 2分" / "底特律老虎>2分"
      selection=homeInSel?"home":awayInSel?"away":"away";
      const mgM=selectionText.match(/>\s*2\s*分/);
      if(mgM){lineVal="3+"}
      else{const numM=selectionText.match(/(\d)\s*分/);if(numM)lineVal=numM[1]}
    }else if(market==="total"||market==="team_total_home"||market==="team_total_away"){
      selection=selectionText.includes("小")?"under":"over";
      if(market==="total"){
        if(homeInSel)market="team_total_home";
        else if(awayInSel)market="team_total_away";
      }
    }else{
      selection=homeInSel?"home":awayInSel?"away":"away";
    }

    return{
      away_full:a.awayFull,home_full:a.homeFull,
      away:awayShort,home:homeShort,
      market,selection,line:lineVal,
      odds:allOdds[idx]||0,
      date:gameDate
    };
  });

  // 6. Group legs into bets using bet markers
  // Use the BET date (first date right after each 兩關 marker = Taiwan投注日 = US game date)
  const bets=[];
  let legIdx=0;
  for(let bi=0;bi<betMarkers.length;bi++){
    const bm=betMarkers[bi];
    // Find bet date: first date immediately after the marker
    let betDate="";
    for(let j=bm.li+1;j<Math.min(bm.li+4,lines.length);j++){
      const dm=lines[j].match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
      if(dm){betDate=`${dm[1]}-${String(dm[2]).padStart(2,"0")}-${String(dm[3]).padStart(2,"0")}`;break}
    }
    const betLegs=[];
    for(let k=0;k<bm.count&&legIdx<parsedLegs.length;k++){
      const leg={...parsedLegs[legIdx++]};
      leg.date=betDate; // override with bet date
      betLegs.push(leg);
    }
    if(!betLegs.length)continue;
    bets.push({
      type:bm.count>1?"parlay":"single",
      legs_count:bm.count,
      date:betDate,
      amount:ntdAll[bi*2]||100,
      legs:betLegs
    });
  }

  // Fallback: if no markers found, treat all legs as one bet
  if(!bets.length&&parsedLegs.length){
    bets.push({type:parsedLegs.length>1?"parlay":"single",legs_count:parsedLegs.length,date:parsedLegs[0].date||"",amount:ntdAll[0]||100,legs:parsedLegs});
  }

  return{bets};
}

// ─── Bet logic ───
function determineResult(leg,hs,as){
  const h=Number(hs),a=Number(as);if(isNaN(h)||isNaN(a))return"pending";
  const t=h+a;
  if(leg.market==="normal"){if(h===a)return"push";return(leg.selection==="home"&&h>a)||(leg.selection==="away"&&a>h)?"win":"lose"}
  if(leg.market==="handi"){const s=Number(leg.line),adj=h+s;if(adj===a)return"push";return(leg.selection==="home"&&adj>a)||(leg.selection==="away"&&a>adj)?"win":"lose"}
  if(leg.market==="total"){const l=Number(leg.line);if(t===l)return"push";return(leg.selection==="over"&&t>l)||(leg.selection==="under"&&t<l)?"win":"lose"}
  if(leg.market==="team_total_home"){const l=Number(leg.line);if(h===l)return"push";return(leg.selection==="over"&&h>l)||(leg.selection==="under"&&h<l)?"win":"lose"}
  if(leg.market==="team_total_away"){const l=Number(leg.line);if(a===l)return"push";return(leg.selection==="over"&&a>l)||(leg.selection==="under"&&a<l)?"win":"lose"}
  if(leg.market==="margin"){
    const diff=leg.selection==="home"?h-a:a-h;
    if(diff<=0)return"lose"; // selected team didn't win
    if(leg.line==="3+")return diff>=3?"win":"lose";
    const exact=Number(leg.line);
    return diff===exact?"win":"lose";
  }
  return"pending";
}
const ML_GLOBAL={normal:"不讓分",handi:"讓分",total:"大小分",team_total_home:"主隊大小",team_total_away:"客隊大小",margin:"勝分差"};
function fmtLine(market,line){
  if(market==="margin"){if(line==="3+")return" >2分";return line?` ${line}分`:"";}
  return line?` ${line}`:"";
}
function calcPayout(bet){
  const legs=bet.legs;
  const anyLose=legs.some(l=>l.result==="lose");
  if(anyLose)return{status:"lose",profit:-bet.amount};
  const allSettled=legs.every(l=>l.result!=="pending");
  if(!allSettled)return{status:"pending",profit:0};
  const e=legs.reduce((a,l)=>a*(l.result==="push"?1:l.odds),1);
  return{status:"win",profit:Math.round(bet.amount*e)-bet.amount};
}

// ─── DatePicker ───
function DatePicker({value,onChange}){
  const ref=useRef(null);
  const[open,setOpen]=useState(false);
  const parsed=value?value.split("-").map(Number):[null,null,null];
  const[viewY,setViewY]=useState(parsed[0]||new Date().getFullYear());
  const[viewM,setViewM]=useState(parsed[1]||new Date().getMonth()+1);

  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",h);document.addEventListener("touchstart",h);
    return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h)};
  },[open]);

  useEffect(()=>{
    if(open&&value){const p=value.split("-").map(Number);setViewY(p[0]);setViewM(p[1])}
  },[open]);

  const daysInMonth=(y,m)=>new Date(y,m,0).getDate();
  const firstDay=(y,m)=>new Date(y,m-1,1).getDay();
  const pad=n=>String(n).padStart(2,"0");
  const fmt=value?`${parsed[0]}/${pad(parsed[1])}/${pad(parsed[2])}`:"選擇日期";

  const prevM=()=>{if(viewM===1){setViewM(12);setViewY(viewY-1)}else setViewM(viewM-1)};
  const nextM=()=>{if(viewM===12){setViewM(1);setViewY(viewY+1)}else setViewM(viewM+1)};

  const days=daysInMonth(viewY,viewM);
  const start=firstDay(viewY,viewM);
  const weeks=["日","一","二","三","四","五","六"];
  const cells=[];
  for(let i=0;i<start;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(d);

  const selDay=(d)=>{
    onChange(`${viewY}-${pad(viewM)}-${pad(d)}`);
    setOpen(false);
  };

  const isToday=(d)=>{const t=new Date();return viewY===t.getFullYear()&&viewM===t.getMonth()+1&&d===t.getDate()};
  const isSel=(d)=>value===`${viewY}-${pad(viewM)}-${pad(d)}`;

  return<div ref={ref} style={{position:"relative"}}>
    <button onClick={()=>setOpen(!open)} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.bd}`,background:C.bg,color:value?C.t:C.m,fontSize:14,textAlign:"left",cursor:"pointer",outline:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span>{fmt}</span><span style={{color:C.d,fontSize:12}}>📅</span>
    </button>
    {open&&<div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:C.card,border:`1px solid ${C.bd}`,borderRadius:10,padding:12,zIndex:100,boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <button onClick={()=>setViewY(viewY-1)} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>«</button>
        <button onClick={prevM} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>‹</button>
        <span style={{fontSize:14,fontWeight:700,color:C.t}}>{viewY}年 {viewM}月</span>
        <button onClick={nextM} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>›</button>
        <button onClick={()=>setViewY(viewY+1)} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>»</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center"}}>
        {weeks.map(w=><div key={w} style={{fontSize:11,color:C.m,padding:"4px 0",fontWeight:600}}>{w}</div>)}
        {cells.map((d,i)=>d?<button key={i} onClick={()=>selDay(d)} style={{padding:"6px 0",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,fontWeight:isSel(d)?700:400,background:isSel(d)?C.acc:isToday(d)?"rgba(245,158,11,0.15)":"transparent",color:isSel(d)?"#000":isToday(d)?C.acc:C.t,outline:"none",transition:"background .1s"}}>{d}</button>:<div key={i}/>)}
      </div>
      <div style={{display:"flex",justifyContent:"center",marginTop:8}}>
        <button onClick={()=>{const t=todayStr();onChange(t);const p=t.split("-").map(Number);setViewY(p[0]);setViewM(p[1]);setOpen(false)}} style={{background:"none",border:`1px solid ${C.bd}`,borderRadius:6,padding:"4px 12px",color:C.acc,cursor:"pointer",fontSize:12,outline:"none"}}>今天</button>
      </div>
    </div>}
  </div>;
}
function Sel({value,onChange,options,placeholder}){return<select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.bd}`,background:C.bg,color:value?C.t:C.m,fontSize:14,boxSizing:"border-box",outline:"none"}}><option value="">{placeholder||"請選擇"}</option>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>}
function Pill({sel,onClick,children}){return<button onClick={onClick} style={{padding:"6px 14px",borderRadius:20,fontSize:13,cursor:"pointer",fontWeight:600,border:sel?`2px solid ${C.acc}`:`1px solid ${C.bd}`,background:sel?C.accD:C.bg,color:sel?C.acc:C.d,transition:"all .15s",outline:"none"}}>{children}</button>}
function Stat({label,value,unit,color}){return<div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bd}`}}><div style={{fontSize:11,color:C.d,marginBottom:4}}>{label}</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:19,fontWeight:700,color:color||C.t}}>{value}<span style={{fontSize:11,fontWeight:400,color:C.d}}> {unit||""}</span></div></div>}

// ADD BET VIEW
// ═══════════════════════════════════════
function AddBetView({addBet,uid}){
  const empty=()=>({id:genId(),away:"",home:"",market:"normal",selection:"",line:"",odds:"",homeScore:"",awayScore:""});
  const[type,setType]=useState("single");
  const[date,setDate]=useState(todayStr());
  const[legs,setLegs]=useState([empty()]);
  const[amt,setAmt]=useState("");
  const[note,setNote]=useState("");
  const upLeg=(i,l)=>setLegs(p=>p.map((x,j)=>j===i?l:x));
  const rmLeg=i=>setLegs(p=>p.filter((_,j)=>j!==i));
  const addLeg=()=>{if(legs.length<5)setLegs(p=>[...p,empty()])};
  const valid=()=>amt&&Number(amt)>0&&legs.every(l=>l.away&&l.home&&l.selection&&l.odds&&Number(l.odds)>0);
  const tOdds=legs.reduce((a,l)=>a*(Number(l.odds)||1),1);
  const submit=()=>{
    if(!valid())return;
    const mk=l=>{const wl={...l,date};const res=(wl.homeScore!==""&&wl.awayScore!=="")?determineResult(wl,wl.homeScore,wl.awayScore):"pending";return{...wl,odds:Number(wl.odds),result:res}};
    if(type==="single")legs.forEach(l=>addBet({id:genId(),type:"single",legs:[mk(l)],amount:Number(amt),totalOdds:Number(l.odds),note,createdAt:new Date().toISOString()}));
    else addBet({id:genId(),type:"parlay",legs:legs.map(mk),amount:Number(amt),totalOdds:Math.round(tOdds*100)/100,note,createdAt:new Date().toISOString()});
    setLegs([empty()]);setAmt("");setNote("");
  };

  // ─── OCR Scan ───
  const fileRef=useRef(null);
  const[scanning,setScanning]=useState(false);
  const[scanErr,setScanErr]=useState("");
  const[scanResults,setScanResults]=useState(null);
  const[rawOcrText,setRawOcrText]=useState("");
  const[showRawOcr,setShowRawOcr]=useState(false);
  const[ocrKey,setOcrKey]=useState(()=>load("ocr-api-key","")||"");
  const[showKeyInput,setShowKeyInput]=useState(false);

  // Sync OCR.space API key from Firestore
  useEffect(()=>{
    if(!uid)return;
    const ref=db.collection("users").doc(uid).collection("meta").doc("ocrApiKey");
    const unsub=ref.onSnapshot(snap=>{
      if(snap.exists){const k=snap.data().key;if(k&&k!==ocrKey){setOcrKey(k);save("ocr-api-key",k)}}
    },()=>{});
    return()=>unsub();
  },[uid]);

  const saveOcrKey=async(k)=>{
    setOcrKey(k);save("ocr-api-key",k);
    if(uid){try{await db.collection("users").doc(uid).collection("meta").doc("ocrApiKey").set({key:k,updatedAt:new Date().toISOString()})}catch(e){}}
  };

  const handleScan=async(e)=>{
    const files=Array.from(e.target.files||[]);
    if(!files.length)return;
    if(!ocrKey.trim()){setScanErr("請先設定 OCR API Key");setShowKeyInput(true);return}
    setScanning(true);setScanErr("");setScanResults(null);
    try{
      let allRawText="";
      const allBets=[];
      for(let fi=0;fi<files.length;fi++){
        const file=files[fi];
        const dataUrl=await new Promise((ok,fail)=>{
          const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=fail;r.readAsDataURL(file);
        });
        const rawText=await ocrImage(dataUrl,ocrKey.trim());
        allRawText+=(fi>0?"\n--- 第 "+(fi+1)+" 張 ---\n":"")+rawText;
        if(!rawText.trim())continue;
        const result=parseOcrText(rawText);
        if(result.bets&&result.bets.length){
          result.bets.forEach(bet=>{
            bet.legs.forEach(l=>{
              l.away=twTeam(l.away_full||"");
              l.home=twTeam(l.home_full||"");
            });
          });
          allBets.push(...result.bets);
        }
      }
      setRawOcrText(allRawText);
      if(!allBets.length)throw new Error("無法從 OCR 文字中解析投注單");
      setScanResults(allBets);
    }catch(err){setScanErr("掃描失敗："+err.message)}
    setScanning(false);
    if(fileRef.current)fileRef.current.value="";
  };

  const applyScanBet=(bet)=>{
    const t=bet.legs_count>1?"parlay":"single";
    setType(t);
    if(bet.date)setDate(bet.date);
    setAmt(String(bet.amount||100));
    const mapped=bet.legs.map(l=>({
      id:genId(),away:l.away||"",home:l.home||"",
      market:l.market||"normal",selection:l.selection||"",
      line:l.line||"",odds:String(l.odds||""),
      homeScore:"",awayScore:""
    }));
    setLegs(mapped.length?mapped:[empty()]);
    // Remove this bet from scan results
    setScanResults(p=>p?p.filter(b=>b!==bet):null);
  };

  const submitAllScan=()=>{
    if(!scanResults)return;
    scanResults.forEach(bet=>{
      const betDate=bet.date||date;
      const mk=l=>{
        const away=TEAMS.includes(l.away)?l.away:(l.away||"");
        const home=TEAMS.includes(l.home)?l.home:(l.home||"");
        return{
          id:genId(),date:l.date||betDate,
          away,home,
          market:l.market||"normal",selection:l.selection||"",
          line:l.line||"",odds:Number(l.odds)||0,
          homeScore:"",awayScore:"",result:"pending"
        };
      };
      const betType=bet.legs_count>1?"parlay":"single";
      if(betType==="single"){
        // Single: each leg is a separate bet (same as manual submit)
        bet.legs.forEach(l=>{
          const leg=mk(l);
          addBet({id:genId(),type:"single",legs:[leg],amount:Number(bet.amount)||100,totalOdds:leg.odds,note:"",createdAt:new Date().toISOString()});
        });
      }else{
        const betLegs=bet.legs.map(mk);
        const tOdds=betLegs.reduce((a,l)=>a*(l.odds||1),1);
        addBet({id:genId(),type:"parlay",legs:betLegs,amount:Number(bet.amount)||100,totalOdds:Math.round(tOdds*100)/100,note:"",createdAt:new Date().toISOString()});
      }
    });
    setScanResults(null);
  };

  return<div>
    <div style={{fontSize:16,fontWeight:700,marginBottom:14}}>新增投注紀錄</div>

    {/* OCR Scan Section */}
    <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bd}`,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:700,color:C.b}}>📷 掃描投注單</div>
        <button onClick={()=>setShowKeyInput(!showKeyInput)} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:11}}>{ocrKey?"已設定 ✓":"設定 API Key"}</button>
      </div>
      {showKeyInput&&<div style={{marginBottom:10}}>
        <Inp value={ocrKey} onChange={saveOcrKey} placeholder="貼上 OCR.space API Key" mono/>
        <div style={{fontSize:10,color:C.m,marginTop:4}}>免費 25K 次/月 · 到 ocr.space/ocrapi 免費註冊取得 · 跨裝置同步</div>
      </div>}
      <input ref={fileRef} type="file" accept="image/*" multiple capture="environment" onChange={handleScan} style={{display:"none"}}/>
      <button onClick={()=>fileRef.current?.click()} disabled={scanning} style={{width:"100%",padding:10,borderRadius:8,border:`1px solid ${C.b}`,background:scanning?"transparent":"rgba(59,130,246,0.1)",color:scanning?C.m:C.b,fontSize:13,fontWeight:600,cursor:scanning?"default":"pointer",outline:"none"}}>
        {scanning?"辨識中...":"上傳投注單截圖 (可多張)"}
      </button>
      {scanErr&&<div style={{fontSize:11,color:C.r,marginTop:6}}>{scanErr}</div>}
      {rawOcrText&&<div style={{marginTop:8}}>
        <button onClick={()=>setShowRawOcr(!showRawOcr)} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:11,padding:0}}>{showRawOcr?"隱藏":"顯示"} OCR 原始文字</button>
        {showRawOcr&&<pre style={{fontSize:10,color:C.d,background:C.bg,padding:8,borderRadius:6,marginTop:4,whiteSpace:"pre-wrap",wordBreak:"break-all",maxHeight:200,overflow:"auto",border:`1px solid ${C.bd}`}}>{rawOcrText}</pre>}
      </div>}
    </div>

    {/* Scan Results */}
    {scanResults&&scanResults.length>0&&<div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:700,color:C.g}}>辨識結果 ({scanResults.length} 筆)</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={submitAllScan} style={{background:C.g,border:"none",borderRadius:6,padding:"4px 12px",color:"#000",fontSize:11,fontWeight:700,cursor:"pointer",outline:"none"}}>全部加入</button>
          <button onClick={()=>setScanResults(null)} style={{background:"none",border:`1px solid ${C.bd}`,borderRadius:6,padding:"4px 12px",color:C.d,fontSize:11,cursor:"pointer",outline:"none"}}>清除</button>
        </div>
      </div>
      {scanResults.map((bet,bi)=>{
        const betType=bet.legs_count>1?`串${bet.legs_count}關`:"單場";
        const totalOdds=bet.legs.reduce((a,l)=>a*(Number(l.odds)||1),1);
        const payout=Math.round((bet.amount||100)*totalOdds);
        return<div key={bi} style={{background:C.bg,borderRadius:8,padding:10,border:`1px solid ${C.bd}`,marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div>
              <span style={{fontSize:12,fontWeight:600}}>{betType} · {bet.date} · NT${bet.amount}</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.acc,marginLeft:8}}>×{totalOdds.toFixed(2)} = <span style={{color:C.g,fontWeight:700}}>${payout.toLocaleString()}</span></span>
            </div>
            <button onClick={()=>applyScanBet(bet)} style={{background:C.acc,border:"none",borderRadius:6,padding:"4px 10px",color:"#000",fontSize:11,fontWeight:700,cursor:"pointer",outline:"none"}}>填入表單</button>
          </div>
          {bet.legs.map((l,li)=>{
            const ML=ML_GLOBAL;
            const selLabel=l.selection==="home"?l.home:l.selection==="away"?l.away:l.selection==="over"?"大":"小";
            return<div key={li} style={{fontSize:11,color:C.d,padding:"3px 0",borderTop:li?`1px solid ${C.bd}`:"none"}}>
              <span style={{color:C.t}}>{l.away} @ {l.home}</span>
              <span style={{color:C.m}}> · </span>
              <span style={{color:C.acc}}>{ML[l.market]||l.market}{fmtLine(l.market,l.line)}</span>
              <span style={{color:C.m}}> → </span>
              <span style={{color:C.g,fontWeight:600}}>{selLabel}</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",marginLeft:6,color:C.t}}>@{l.odds}</span>
            </div>;
          })}
        </div>;
      })}
    </div>}

    <Field label="投注類型"><div style={{display:"flex",gap:8}}>
      <Pill sel={type==="single"} onClick={()=>{setType("single");if(legs.length>1)setLegs([legs[0]])}}>單場</Pill>
      <Pill sel={type==="parlay"} onClick={()=>{setType("parlay");if(legs.length<2)setLegs([...legs,empty()])}}>串關</Pill>
    </div></Field>

    <Field label="比賽日期"><DatePicker value={date} onChange={setDate}/></Field>

    {legs.map((leg,i)=><LegEdit key={leg.id} leg={leg} idx={i} onChange={l=>upLeg(i,l)} onRemove={()=>rmLeg(i)} canRemove={type==="parlay"&&legs.length>2}/>)}

    {type==="parlay"&&legs.length<5&&<button onClick={addLeg} style={{width:"100%",padding:10,borderRadius:8,border:`1px dashed ${C.bd}`,background:"transparent",color:C.d,cursor:"pointer",fontSize:13,marginBottom:12}}>＋ 新增一關（{legs.length}/5）</button>}
    {type==="parlay"&&legs.length>=2&&legs.every(l=>Number(l.odds)>0)&&<div style={{background:C.accD,borderRadius:8,padding:"10px 16px",marginBottom:12,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:C.acc}}>串{legs.length}關總賠率</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:C.acc,fontSize:17}}>{tOdds.toFixed(2)}</span></div>}

    <Field label="投注金額（NT$）"><Inp value={amt} onChange={setAmt} placeholder="100" type="number" mono/></Field>
    {amt&&Number(amt)>0&&<div style={{fontSize:13,color:C.g,marginBottom:12,marginTop:-6}}>預估獎金：NT$ {Math.round(Number(amt)*tOdds).toLocaleString()}</div>}
    <Field label="備註（選填）"><Inp value={note} onChange={setNote} placeholder="先發投手、觀察筆記..."/></Field>
    <button onClick={submit} disabled={!valid()} style={{width:"100%",padding:14,borderRadius:10,border:"none",fontSize:15,fontWeight:700,background:valid()?C.acc:C.m,color:valid()?"#000":C.d,cursor:valid()?"pointer":"default",outline:"none"}}>
      {type==="parlay"?`確認送出（串${legs.length}關）`:"確認送出"}
    </button>
  </div>;
}

function LegEdit({leg,idx,onChange,onRemove,canRemove}){

function HistView({bets,updateBet,deleteBet}){
  const[filter,setFilter]=useState("all");
  const ML=ML_GLOBAL;
  const filtered=bets.filter(b=>filter==="all"||calcPayout(b).status===filter);
  if(!bets.length)return<div style={{textAlign:"center",padding:"60px 20px",color:C.d}}><div style={{fontSize:40,marginBottom:12}}>📋</div><div>尚無投注紀錄</div></div>;
  return<div>
    <div style={{fontSize:16,fontWeight:700,marginBottom:14}}>投注紀錄</div>
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>{[["all","全部"],["pending","未結算"],["win","贏"],["lose","輸"]].map(([k,l])=><Pill key={k} sel={filter===k} onClick={()=>setFilter(k)}>{l}</Pill>)}</div>
    {filtered.map(bet=>{const r=calcPayout(bet);return<BetCard key={bet.id} bet={bet} r={r} updateBet={updateBet} deleteBet={deleteBet} ML={ML}/>})}
    <div style={{textAlign:"center",fontSize:12,color:C.m,padding:12}}>共 {filtered.length} 筆</div>

}

function ResultsView({games,addGames,updateGame,deleteGame}){
  const[mode,setMode]=useState("list");
  const[importDate,setImportDate]=useState(todayPT());
  const[importing,setImporting]=useState(false);
  const[importResult,setImportResult]=useState(null);
  const[listDate,setListDate]=useState(todayPT());

  const doImport=async()=>{
    setImporting(true);setImportResult(null);
    try{
      const fetched=await fetchMLBGames(importDate);
      if(!fetched.length){setImportResult({ok:false,msg:"該日無已完賽的比賽"});setImporting(false);return}
      const existIds=new Set(games.map(g=>g.id));
      const newGames=fetched.filter(g=>!existIds.has(g.id));
      if(!newGames.length){setImportResult({ok:true,msg:`${fetched.length} 場比賽皆已匯入過`});setImporting(false);return}
      await addGames(newGames);
      setImportResult({ok:true,msg:`成功匯入 ${newGames.length} 場比賽（共 ${fetched.length} 場）`});
    }catch(e){setImportResult({ok:false,msg:"匯入失敗："+e.message})}
    setImporting(false);
  };

  const filtered=games.filter(g=>g.date===listDate);

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:16,fontWeight:700}}>賽果紀錄</div>
      <div style={{display:"flex",gap:6}}><Pill sel={mode==="list"} onClick={()=>setMode("list")}>列表</Pill><Pill sel={mode==="import"} onClick={()=>setMode("import")}>匯入</Pill></div>
    </div>

    {mode==="import"&&<div style={{background:C.card,borderRadius:10,padding:16,border:`1px solid ${C.bd}`,marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>從 MLB 匯入賽果</div>
      <Field label="選擇日期（美東時間）"><DatePicker value={importDate} onChange={setImportDate}/></Field>
      <button onClick={doImport} disabled={importing} style={{width:"100%",padding:12,borderRadius:8,border:"none",fontSize:14,fontWeight:700,background:importing?C.m:C.acc,color:importing?C.d:"#000",cursor:importing?"default":"pointer",outline:"none"}}>
        {importing?"匯入中...":"匯入該日所有賽果"}
      </button>
      {importResult&&<div style={{marginTop:10,padding:"10px 14px",borderRadius:8,fontSize:13,background:importResult.ok?C.gD:C.rD,color:importResult.ok?C.g:C.r}}>{importResult.msg}</div>}
    </div>}

    {mode==="list"&&<div>
      <Field label="選擇日期"><DatePicker value={listDate} onChange={setListDate}/></Field>
      {filtered.length===0?<div style={{textAlign:"center",padding:"40px 20px",color:C.d}}><div style={{fontSize:40,marginBottom:12}}>⚾</div><div>{listDate} 無賽果紀錄</div><div style={{fontSize:13,marginTop:4}}>到「匯入」頁面抓取該日賽果</div></div>:
      filtered.map(g=><GameCard key={g.id} game={g} updateGame={updateGame} deleteGame={deleteGame}/>)}
      {filtered.length>0&&<div style={{textAlign:"center",fontSize:12,color:C.m,padding:8}}>共 {filtered.length} 場</div>}
    </div>}
  </div>;
}

// ─── Team Stats Calculator ───
function calcTeamStats(games,team){
  const gs=games.filter(g=>g.away===team||g.home===team).sort((a,b)=>b.date.localeCompare(a.date));
  if(!gs.length)return null;
  const isHome=g=>g.home===team;
  const won=g=>(isHome(g)&&g.homeScore>g.awayScore)||(!isHome(g)&&g.awayScore>g.homeScore);
  const scored=g=>isHome(g)?g.homeScore:g.awayScore;
  const allowed=g=>isHome(g)?g.awayScore:g.homeScore;
  const margin=g=>scored(g)-allowed(g);
  const total=g=>g.homeScore+g.awayScore;
  const absMargin=g=>Math.abs(g.homeScore-g.awayScore);
  let streak=0,streakType=won(gs[0])?"W":"L";
  for(const g of gs){if((won(g)?"W":"L")===streakType)streak++;else break}
  const rec=(n)=>{const s=gs.slice(0,n);const w=s.filter(won).length;return{w,l:s.length-w,n:s.length}};
  const homeGs=gs.filter(isHome),awayGs=gs.filter(g=>!isHome(g));
  const homeW=homeGs.filter(won).length,awayW=awayGs.filter(won).length;
  const avgScored=(gs.reduce((a,g)=>a+scored(g),0)/gs.length).toFixed(1);
  const avgAllowed=(gs.reduce((a,g)=>a+allowed(g),0)/gs.length).toFixed(1);
  const avgTotal=(gs.reduce((a,g)=>a+total(g),0)/gs.length).toFixed(1);
  const avgMargin=(gs.filter(won).reduce((a,g)=>a+margin(g),0)/(gs.filter(won).length||1)).toFixed(1);
  const coverRate15=gs.length?(gs.filter(g=>won(g)&&absMargin(g)>1.5).length/gs.length*100).toFixed(0):"—";
  const ouRate=(line)=>gs.length?(gs.filter(g=>total(g)>line).length/gs.length*100).toFixed(0):"—";
  const margins={close:0,mid:0,blow:0};
  gs.forEach(g=>{const m=absMargin(g);if(m<=2)margins.close++;else if(m<=4)margins.mid++;else margins.blow++});
  const recent=gs.slice(0,10).map(g=>({date:g.date,opp:isHome(g)?g.away:g.home,result:won(g)?"W":"L",score:`${scored(g)}-${allowed(g)}`,total:total(g),margin:margin(g),home:isHome(g)}));
  return{streak,streakType,rec5:rec(5),rec10:rec(10),rec20:rec(20),homeW,homeTotal:homeGs.length,awayW,awayTotal:awayGs.length,avgScored,avgAllowed,avgTotal,avgMargin,coverRate15,ou75:ouRate(7.5),ou85:ouRate(8.5),ou95:ouRate(9.5),margins,recent,totalGames:gs.length};
}

function StatsView({bets,games}){
  const[section,setSection]=useState("team");
  const[matchupIdx,setMatchupIdx]=useState(0);
  const analysisData=useMemo(()=>load("mlb-analysis",null),[section]);

  // --- Bet stats ---
  const mono={fontFamily:"'JetBrains Mono',monospace"};
  const settled=bets.filter(b=>calcPayout(b).status!=="pending");
  const ML=ML_GLOBAL;

  // Bet-level stats (注單層：整注贏/輸)
  const betWins=settled.filter(b=>calcPayout(b).status==="win").length;
  const betAmt=settled.reduce((a,b)=>a+b.amount,0);
  const betProfit=settled.reduce((a,b)=>a+calcPayout(b).profit,0);
  const betAvgOdds=settled.length?settled.reduce((a,b)=>a+b.totalOdds,0)/settled.length:0;
  const betMaxWin=settled.length?Math.max(...settled.map(b=>calcPayout(b).profit)):0;
  const betMaxLoss=settled.length?Math.min(...settled.map(b=>calcPayout(b).profit)):0;

  // Leg-level stats (單關層：每關獨立看勝負)
  const allLegs=[];
  settled.forEach(b=>{b.legs.forEach(l=>{if(l.result!=="pending")allLegs.push(l)})});
  const legWins=allLegs.filter(l=>l.result==="win").length;

  // Per-market stats (以「關」為單位)
  const byMkt={};
  settled.forEach(b=>{
    b.legs.forEach(l=>{
      const k=l.market;
      if(!byMkt[k])byMkt[k]={w:0,t:0,legs:[],selHome:0,selHomeW:0,selAway:0,selAwayW:0,selOver:0,selOverW:0,selUnder:0,selUnderW:0,oddsSum:0};
      const m=byMkt[k];
      const legWin=l.result==="win";
      if(l.result==="pending")return;
      m.t++;if(legWin)m.w++;
      m.legs.push({win:legWin,date:l.date});
      m.oddsSum+=Number(l.odds)||0;
      if(l.selection==="home"){m.selHome++;if(legWin)m.selHomeW++}
      if(l.selection==="away"){m.selAway++;if(legWin)m.selAwayW++}
      if(l.selection==="over"){m.selOver++;if(legWin)m.selOverW++}
      if(l.selection==="under"){m.selUnder++;if(legWin)m.selUnderW++}
    });
  });

  // Parlay leg count grouping (串幾關)
  const byLegCount={};
  settled.forEach(b=>{
    const n=b.legs.length;
    if(!byLegCount[n])byLegCount[n]={count:0,wins:0,amount:0,profit:0};
    const g=byLegCount[n];
    g.count++;
    const p=calcPayout(b);
    if(p.status==="win")g.wins++;
    g.amount+=b.amount;
    g.profit+=p.profit;
  });

  const[betMktTab,setBetMktTab]=useState("all");

  const exportMD=()=>{
    let md="# MLB 投注報告\n\n";
    md+=`匯出時間：${new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei"})}\n\n`;

    // 1. 投注統計摘要
    md+="## 投注統計\n\n";
    md+=`| 項目 | 數值 |\n|------|------|\n`;
    md+=`| 已結算 | ${settled.length} 注 |\n`;
    md+=`| 注單勝率 | ${settled.length?((betWins/settled.length)*100).toFixed(1):0}% (${betWins}W/${settled.length-betWins}L) |\n`;
    md+=`| 總投注 | NT$${betAmt.toLocaleString()} |\n`;
    md+=`| 累積盈虧 | ${betProfit>=0?"+":""}NT$${betProfit.toLocaleString()} |\n`;
    md+=`| ROI | ${betAmt?((betProfit/betAmt)*100).toFixed(1):0}% |\n`;
    md+=`| 總關數 | ${allLegs.length} |\n`;
    md+=`| 過關率 | ${allLegs.length?((legWins/allLegs.length)*100).toFixed(1):0}% (${legWins}W/${allLegs.length-legWins}L) |\n\n`;

    // 串關腳數
    if(Object.keys(byLegCount).length>0){
      md+="### 串關腳數分析\n\n";
      md+=`| 類型 | 注數 | 勝率 | 盈虧 | ROI |\n|------|------|------|------|-----|\n`;
      Object.entries(byLegCount).sort((a,b)=>Number(a[0])-Number(b[0])).forEach(([n,g])=>{
        const wr=g.count?(g.wins/g.count*100).toFixed(0):0;
        const roi=g.amount?(g.profit/g.amount*100).toFixed(1):0;
        md+=`| 串${n}關 | ${g.count} | ${wr}% | ${g.profit>=0?"+":""}${g.profit.toLocaleString()} | ${roi}% |\n`;
      });
      md+="\n";
    }

    // 各玩法
    if(Object.keys(byMkt).length>0){
      md+="### 各玩法統計\n\n";
      md+=`| 玩法 | 關數 | 過關率 | 平均賠率 |\n|------|------|--------|----------|\n`;
      Object.entries(byMkt).forEach(([k,m])=>{
        const wr=m.t?(m.w/m.t*100).toFixed(1):0;
        const avg=m.t?(m.oddsSum/m.t).toFixed(2):0;
        md+=`| ${ML[k]||k} | ${m.t} | ${wr}% (${m.w}W/${m.t-m.w}L) | ${avg} |\n`;
      });
      md+="\n";
    }

    // 2. 投注紀錄明細
    md+="## 投注紀錄\n\n";
    bets.forEach(bet=>{
      const r=calcPayout(bet);
      const st=r.status==="win"?"WIN":r.status==="lose"?"LOSE":"PENDING";
      md+=`### ${bet.legs[0]?.date} 串${bet.legs.length}關 [${st}]\n\n`;
      md+=`- 金額：NT$${bet.amount.toLocaleString()} × ${bet.totalOdds.toFixed(2)}\n`;
      if(r.status!=="pending")md+=`- 盈虧：${r.profit>=0?"+":""}NT$${r.profit.toLocaleString()}\n`;

            {/* Home/Away, scoring */}

            </div>

            {/* Handicap & O/U rates */}
            <div style={{background:C.card,borderRadius:10,padding:12,border:`1px solid ${C.bd}`,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:8}}>

              {cmpRow("讓1.5過關",awayTs?awayTs.coverRate15+"%":"—",homeTs?homeTs.coverRate15+"%":"—")}
              {cmpRow("大7.5",awayTs?awayTs.ou75+"%":"—",homeTs?homeTs.ou75+"%":"—")}
              {cmpRow("大8.5",awayTs?awayTs.ou85+"%":"—",homeTs?homeTs.ou85+"%":"—")}
              {cmpRow("大9.5",awayTs?awayTs.ou95+"%":"—",homeTs?homeTs.ou95+"%":"—")}
            </div>

            {/* Margin distribution */}
            <div style={{background:C.card,borderRadius:10,padding:12,border:`1px solid ${C.bd}`,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:8}}>
                <span style={{fontSize:14,fontWeight:700,color:C.acc}}>📏 分差分布</span>
              </div>
              {[["≤2分","close",C.b],["3-4分","mid",C.acc],["≥5分","blow",C.g]].map(([label,key,col])=>{
                const aPct=awayTs&&awayTs.totalGames?(awayTs.margins[key]/awayTs.totalGames*100).toFixed(0):0;
                const hPct=homeTs&&homeTs.totalGames?(homeTs.margins[key]/homeTs.totalGames*100).toFixed(0):0;
                return cmpRow(label,awayTs?`${awayTs.margins[key]}場(${aPct}%)`:"—",homeTs?`${homeTs.margins[key]}場(${hPct}%)`:"—");

            {/* Recent 10 games side by side */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>

            </div>

          </div>:<div style={{textAlign:"center",padding:30,color:C.d,fontSize:12}}>
            尚無賽果資料，請先在「賽果」頁匯入比賽。

      })()}
    </div>}
  </div>;
}

// FIRESTORE HELPERS
// ═══════════════════════════════════════
function userDoc(uid,col){return db.collection("users").doc(uid).collection(col)}

function useFirestore(uid,colName,localKey,orderField="createdAt"){
  const[data,setData]=useState(()=>load(localKey,[]));
  const fromSnap=useRef(false);

  // Listen to Firestore realtime updates
  useEffect(()=>{
    if(!uid)return;
    const unsub=userDoc(uid,colName).orderBy(orderField,"desc").onSnapshot(snap=>{
      const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
      fromSnap.current=true;
      setData(docs);
      save(localKey,docs);
    },err=>console.error("Firestore listen error:",err));
    return()=>unsub();
  },[uid,colName]);

  const add=useCallback(async(item)=>{
    const{id,...rest}=item;
    if(!rest.createdAt)rest.createdAt=new Date().toISOString();
    await userDoc(uid,colName).doc(id).set(rest);
  },[uid,colName]);

  const update=useCallback(async(id,item)=>{
    const{id:_,...rest}=item;
    await userDoc(uid,colName).doc(id).update(rest);
  },[uid,colName]);

  const remove=useCallback(async(id)=>{
    await userDoc(uid,colName).doc(id).delete();
  },[uid,colName]);

  return{data,setData,add,update,remove,fromSnap};
}

// ANALYSIS VIEW (v3 — multi bet types)
// ═══════════════════════════════════════
const BET_TYPES=[
  {key:"ml",label:"不讓分",short:"不讓分"},
  {key:"spread_1.5",label:"讓分 1.5",short:"讓1.5"},
  {key:"spread_2.5",label:"讓分 2.5",short:"讓2.5"},
  {key:"total_7.5",label:"大小分 7.5",short:"7.5"},
  {key:"total_8.5",label:"大小分 8.5",short:"8.5"},
  {key:"total_9.5",label:"大小分 9.5",short:"9.5"}
];

function getMetricMeta(key){
  if(key.startsWith("composite:"))return{name:key.replace("composite:",""),cat:"composite"};
  if(key.startsWith("comp:"))return{name:key.replace("comp:",""),cat:"composite"};
  if(key.startsWith("sp_"))return{name:key.toUpperCase(),cat:"sp"};
  if(key==="bp_fatigue")return{name:"🔋 牛棚疲勞",cat:"bullpen"};
  if(key==="home_adv")return{name:"🏠 主場優勢",cat:"situational"};
  return{name:key,cat:"team"};
}

function pctColorV3(pct){
  if(pct>=56)return C.g;
  if(pct>=54)return"#34d399";
  if(pct>=52)return C.d;
  if(pct>=50)return"#f59e0b";
  return C.r;
}

function fmtNum(v){
  if(typeof v!=="number")return v;
  if(Math.abs(v)<10)return v.toFixed(3);
  return v.toFixed(2);
}

// Convert predicted value to display label
function formatPrediction(predicted,awayZh,homeZh){
  if(predicted==="home")return homeZh;
  if(predicted==="away")return awayZh;
  if(predicted==="over")return"大";
  if(predicted==="under")return"小";
  return"—";
}

function confidenceStars(conf){
  if(conf==="high")return"⭐⭐⭐";
  if(conf==="medium")return"⭐⭐";
  if(conf==="low")return"⭐";
  return"";
}
function confidenceLabel(conf){
  if(conf==="high")return"高";
  if(conf==="medium")return"中";
  if(conf==="low")return"低";
  return"—";
}

// ─── Stat Comparison Row ───
function StatRow({label,away,home,edge,awayZh,homeZh,warn}){
  const mono={fontFamily:"'JetBrains Mono',monospace"};
  const arrow=edge==="away"?"◀":edge==="home"?"▶":"=";
  const awayCol=edge==="away"?C.g:edge==="home"?C.r:C.d;
  const homeCol=edge==="home"?C.g:edge==="away"?C.r:C.d;
  const edgeCol=edge==="away"?C.g:edge==="home"?C.acc:C.m;
  const edgeText=edge==="away"?`✓ ${awayZh}優`:edge==="home"?`✓ ${homeZh}優`:"持平";
  return<div style={{display:"flex",alignItems:"center",padding:"3px 0",fontSize:12,gap:8}}>
    <div style={{color:C.d,whiteSpace:"nowrap"}}>{label}{warn&&<span style={{color:"#f59e0b",marginLeft:2}}>⚠️</span>}</div>
    <div style={{marginLeft:"auto",...mono,color:awayCol,whiteSpace:"nowrap"}}>{fmtNum(away)}</div>
    <div style={{color:C.m,flexShrink:0}}>{arrow}</div>
    <div style={{...mono,color:homeCol,whiteSpace:"nowrap"}}>{fmtNum(home)}</div>
    <div style={{fontSize:11,color:edgeCol,whiteSpace:"nowrap"}}>{edgeText}</div>
  </div>;
}

// ─── Bet Type Panel inside a matchup card ───
function BetTypePanel({btKey,bt,awayZh,homeZh}){
  const mono={fontFamily:"'JetBrains Mono',monospace"};
  if(!bt)return<div style={{padding:20,textAlign:"center",color:C.d,fontSize:12}}>該盤口無資料</div>;

  const isTop5=bt.is_top_5_pct;
  const isTop10=bt.is_top_10_pct;
  const isConflict=bt.signal_conflict===true;
  // Force confidence to "low" when signal_conflict
  const conf=isConflict?"low":(bt.confidence||"");
  const stars=confidenceStars(conf);
  const predictedZh=formatPrediction(bt.predicted,awayZh,homeZh);
  const votes=bt.votes||{};
  const matchedFilters=bt.matched_filters||[];
  const compScores=bt.composite_scores||{};

  // Top 3 composite scores by abs value
  const topScores=Object.entries(compScores)
    .sort(([,a],[,b])=>Math.abs(b.value||0)-Math.abs(a.value||0))
    .slice(0,5);

  // Determine vote color (which side is voting)
  const voteEntries=Object.entries(votes);

  return<div style={{padding:"10px 0"}}>
    {/* Signal conflict warning */}
    {isConflict&&(()=>{
      const cm=votes.composite_majority;
      const pred=bt.predicted;
      const reversed=cm&&pred&&cm!==pred&&cm!=="even";
      const cmZh=cm==="over"?"大":cm==="under"?"小":cm==="home"?homeZh:cm==="away"?awayZh:cm;
      const predZh=pred==="over"?"大":pred==="under"?"小":pred==="home"?homeZh:pred==="away"?awayZh:pred;
      const reason=reversed
        ?`預測 ${predZh} 與多數複合分數 ${cmZh} 反向`
        :"複合分數內部有強反向訊號";
      return<div style={{background:"rgba(251,191,36,0.12)",border:"1px solid #fbbf24",borderRadius:6,padding:"6px 10px",marginBottom:10,fontSize:12,fontWeight:700,color:"#fbbf24",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <span>⚠️ 訊號衝突</span>
        <span style={{fontSize:11,fontWeight:400}}>· {reason} · 建議跳過</span>
      </div>;
    })()}

    {/* Top 5% / Top 10% banner */}
    {isTop5&&!isConflict&&<div style={{background:"rgba(245,158,11,0.15)",border:`1px solid ${C.acc}`,borderRadius:6,padding:"6px 10px",marginBottom:10,fontSize:12,fontWeight:700,color:C.acc,display:"flex",alignItems:"center",gap:6}}>
      🔥 超高信心 — 符合 Top 5% 篩選條件
    </div>}
    {isTop10&&!isTop5&&!isConflict&&<div style={{background:"rgba(16,185,129,0.12)",border:`1px solid ${C.g}`,borderRadius:6,padding:"6px 10px",marginBottom:10,fontSize:12,fontWeight:700,color:C.g,display:"flex",alignItems:"center",gap:6}}>
      ⭐ Top 10% 高信心場次
    </div>}

    {/* Prediction summary */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
      <div style={{background:C.bg,borderRadius:6,padding:"8px 10px",textAlign:"center",border:`1px solid ${C.bd}`}}>
        <div style={{fontSize:10,color:C.d,marginBottom:2}}>預測</div>

// ─── Poisson Monte Carlo (真實串關勝率) ───
// Knuth's algorithm for Poisson sampling (OK for λ < 30, which covers MLB scoring)
function samplePoisson(lambda){
  if(lambda<=0)return 0;
  const L=Math.exp(-lambda);
  let k=0,p=1;
  while(p>L){k++;p*=Math.random()}
  return k-1;
}

// Estimate per-team expected runs for a matchup, falling back gracefully
function estimateLambdas(matchup){
  const bd=matchup.expected_total_breakdown||{};
  const tc=matchup.team_comparisons||{};
  const et=matchup.expected_total;
  const pf=matchup.venue?.park_factor||1.0;
  const wx=bd.weather_adj||1.0;
  let aL=bd.away_offense,hL=bd.home_offense;
  if(aL==null)aL=(tc.runs_per_game?.away||4.5)*pf*wx;
  if(hL==null)hL=(tc.runs_per_game?.home||4.5)*pf*wx;
  if(et!=null){
    // Blend with expected_total to align total projections
    const scale=et/(aL+hL);
    aL*=scale;hL*=scale;
  }
  return[Math.max(0.3,aL),Math.max(0.3,hL)];
}

// Simulate one leg's hit rate using Poisson scoring
function simulateLegWinRate(leg,trials){
  const[aL,hL]=estimateLambdas(leg.matchup);
  const btKey=leg.btKey;
  const predicted=leg.bt.predicted;
  let hits=0;
  for(let i=0;i<trials;i++){
    const as=samplePoisson(aL);
    const hs=samplePoisson(hL);
    let won=false;
    if(btKey==="ml"){
      won=predicted==="away"?as>hs:hs>as;
    }else if(btKey.startsWith("spread_")){
      const line=parseFloat(btKey.split("_")[1]);
      const margin=predicted==="away"?as-hs:hs-as;
      won=margin>line;
    }else if(btKey.startsWith("total_")){
      const line=parseFloat(btKey.split("_")[1]);
      const total=as+hs;
      won=predicted==="over"?total>line:total<line;
    }
    if(won)hits++;
  }
  return hits/trials;
}

// Full parlay simulation: returns per-leg probs + combined probability (independent)
function simulateParlay(legs,trials=5000){
  const legProbs=legs.map(l=>simulateLegWinRate(l,trials));
  const combined=legProbs.reduce((a,p)=>a*p,1);
  return{legProbs,combined};
}

// ─── Recommendation Scoring ───
function scorePick(matchup,btKey){
  const bt=matchup.bet_types?.[btKey];
  if(!bt||!bt.predicted||bt.predicted==="even")return null;
  // Skip conflicted signals — they're effectively low confidence
  if(bt.signal_conflict===true)return null;
  // Skip spread 2.5 — international markets don't offer this line
  if(btKey==="spread_2.5")return null;

  let score=0;
  // Top 5% is the strongest signal, then Top 10%
  if(bt.is_top_5_pct)score+=200;
  else if(bt.is_top_10_pct)score+=100;

  // Each matched filter adds points based on historical hit rate
  const filters=bt.matched_filters||[];
  let bestHitRate=0,bestMinOdds=null;
  filters.forEach(f=>{
    const hr=f.baseline_hit_rate||50;
    score+=Math.max(0,(hr-50)*3);
    if(hr>bestHitRate){
      bestHitRate=hr;
      bestMinOdds=f.min_odds_needed;
    }
  });
  score+=filters.length*5; // 5 bonus per matched filter count

  // Confidence bonus
  const confBonus={high:30,medium:15,low:5};
  score+=confBonus[bt.confidence]||0;

  // Vote unanimity bonus
  const votes=bt.votes||{};
  const voteVals=Object.values(votes);
  if(voteVals.length>=2){
    const total=voteVals.reduce((a,b)=>a+b,0);
    const max=Math.max(...voteVals);
    if(total>0)score+=(max/total)*25;
  }

  // 系列賽領先加分（僅對方向性盤口：ml / spread / handi）
  // 10 年回測：主隊系列賽領先時 home_win 55.7% vs 基準 53.4% (+2.3pp, z=+3.87)
  const sc=matchup.series_context;
  if(sc&&(btKey==="ml"||btKey==="handi"||btKey.startsWith("spread_"))){
    const hw=sc.home_series_wins_before||0;
    const aw=sc.away_series_wins_before||0;
    if(hw>aw){
      if(bt.predicted==="home")score+=15;
      else if(bt.predicted==="away")score-=10;
    }else if(aw>hw){
      if(bt.predicted==="away")score+=8; // 客隊領先較弱訊號
    }
  }

  return{
    matchup,btKey,bt,score,
    bestHitRate,
    bestMinOdds:bestMinOdds||bt.min_combined_odds_needed,
    filterCount:filters.length
  };
}

// ─── YOLO Pick Scoring (current season data only) ───
// Candidates: spread_1.5 (65.2% HR), spread_2.5 (63.3% HR), total_9.5 over (65.5% HR)
// spread_1.5 added: better hit rate than spread_2.5, increases pool size
// total_9.5: always bet "over" based on scoring environment — ignores 10yr model direction
function scoreYoloPick(matchup,btKey){
  const bt=matchup.bet_types?.[btKey];
  if(!bt||!bt.predicted||bt.predicted==="even")return null;
  if(bt.signal_conflict===true)return null;
  if(!["spread_1.5","spread_2.5","total_9.5"].includes(btKey))return null;

  const tc=matchup.team_comparisons||{};
  const v=matchup.venue||{};
  let score=0;
  let effectivePredicted=bt.predicted;

  const rf=matchup.team_recent_form;

  if(btKey==="spread_2.5"||btKey==="spread_1.5"){
    // Strong team dominating weak team; spread_1.5 has higher HR (65.2% vs 63.3%)
    // so gets a +15 baseline bonus to surface when spread_2.5 scores are marginal
    const predicted=bt.predicted;
    const strong=predicted==="away"?"away":"home";
    const weak=predicted==="away"?"home":"away";

    const rdS=tc.run_diff_per_game?.[strong]||0;
    const rdW=tc.run_diff_per_game?.[weak]||0;
    score+=(rdS-rdW)*(btKey==="spread_1.5"?14:15);

    const opsS=tc.ops?.[strong]||0;
    const opsW=tc.ops?.[weak]||0;
    score+=(opsS-opsW)*200;

    const eraW=tc.era?.[weak]||4;
    const eraS=tc.era?.[strong]||4;
    score+=(eraW-eraS)*8;

    const spRecentWeak=matchup[`${weak}_sp_recent`]||[];
    if(spRecentWeak.length>0){
      let totalIP=0,totalER=0;
      spRecentWeak.forEach(s=>{totalIP+=parseFloat(s.ip)||0;totalER+=s.er||0});
      if(totalIP>0)score+=Math.max(0,(totalER/totalIP*9-4))*5;
    }
    const spRecentStrong=matchup[`${strong}_sp_recent`]||[];
    if(spRecentStrong.length>0){
      let totalIP=0,totalER=0;
      spRecentStrong.forEach(s=>{totalIP+=parseFloat(s.ip)||0;totalER+=s.er||0});
      if(totalIP>0)score+=Math.max(0,(4-totalER/totalIP*9))*5;
    }

    const bpW=tc.bp_fatigue?.[weak]||0;
    if(bpW>=1.0)score+=15;
    if(bt.confidence==="high")score+=10;

    // Recent form (last 15 games): blowout history validates YOLO-style spread picks
    if(rf?.[strong]?.blowout_win_rate!=null){
      score+=Math.max(0,(rf[strong].blowout_win_rate-0.3))*50; // 0.5 → +10
    }
    if(rf?.[weak]?.blowout_loss_rate!=null){
      score+=Math.max(0,(rf[weak].blowout_loss_rate-0.3))*40;
    }
    // Recent run differential edge (complements season-long rd_gap)
    if(rf?.[strong]&&rf?.[weak]){
      const rrdS=(rf[strong].runs_per_game||0)-(rf[strong].ra_per_game||0);
      const rrdW=(rf[weak].runs_per_game||0)-(rf[weak].ra_per_game||0);
      score+=(rrdS-rrdW)*5;
    }

    if(btKey==="spread_1.5")score+=15;

    // 系列賽領先訊號：領先隊若又是推薦方向 → 加分；反向則扣分
    const sc=matchup.series_context;
    if(sc){
      const hw=sc.home_series_wins_before||0;
      const aw=sc.away_series_wins_before||0;
      if(hw>aw&&predicted==="home")score+=12;
      else if(hw>aw&&predicted==="away")score-=8;
      else if(aw>hw&&predicted==="away")score+=8;
    }

  }else if(btKey==="total_9.5"){
    effectivePredicted="over";

    const rpgA=tc.runs_per_game?.away||0;
    const rpgH=tc.runs_per_game?.home||0;
    score+=(rpgA+rpgH-8)*18;

    const opsA=tc.ops?.away||0;
    const opsH=tc.ops?.home||0;
    score+=((opsA+opsH)/2-0.7)*400;

    const eraA=tc.era?.away||4;
    const eraH=tc.era?.home||4;
    score+=((eraA+eraH)/2-3.8)*15;

    const pf=v.park_factor||1.0;
    score+=(pf-1.0)*200;

    ["away","home"].forEach(side=>{
      const spRecent=matchup[`${side}_sp_recent`]||[];
      if(spRecent.length>0){
        let totalIP=0,totalER=0;
        spRecent.forEach(s=>{totalIP+=parseFloat(s.ip)||0;totalER+=s.er||0});
        if(totalIP>0)score+=Math.max(0,(totalER/totalIP*9-4))*5;
      }
    });

    const bpA=tc.bp_fatigue?.away||0;
    const bpH=tc.bp_fatigue?.home||0;
    if(bpA>=1.0)score+=10;
    if(bpH>=1.0)score+=10;

    // Expected total: the strongest single signal (Poisson-based projection)
    // Today's range 4.9–9.0, avg ~6.5; 8.0+ is strong over signal
    const et=matchup.expected_total;
    if(et!=null){
      score+=Math.max(0,(et-7))*25; // 8.0 → +25, 9.0 → +50
      if(et<6)score-=15; // projects under → penalize
    }

    // Recent over 9.5 rate: validates trend beyond season averages
    if(rf?.away?.over_9_5_rate!=null&&rf?.home?.over_9_5_rate!=null){
      const avgOver=(rf.away.over_9_5_rate+rf.home.over_9_5_rate)/2;
      score+=(avgOver-0.45)*70; // 0.55 → +7, 0.65 → +14
    }

    score+=20;
  }

  if(score<=20)return null;
  return{matchup,btKey,bt:{...bt,predicted:effectivePredicted},score,bestHitRate:0,bestMinOdds:null,filterCount:0,isYolo:true};
}

// Cascade exclusion: excluding total_9.5 for a matchup also excludes 8.5 and 7.5
function expandExcludes(excludes){
  const expanded=new Set(excludes);
  for(const ex of excludes){
    const[mid,bk]=ex.split("::");
    if(bk==="total_9.5"){expanded.add(mid+"::total_8.5");expanded.add(mid+"::total_7.5")}
    if(bk==="total_8.5"){expanded.add(mid+"::total_7.5")}
  }
  return expanded;
}

function generateRecommendations(matchups,excludes){
  const matchupId=(m)=>`${m.away}@${m.home}`;
  const blocked=expandExcludes(excludes||new Set());

  // ═══ A區：穩健推薦 1×串5關 (10年指標) ═══
  const stablePicks=[];
  matchups.forEach(m=>{
    Object.keys(m.bet_types||{}).forEach(k=>{
      if(blocked.has(matchupId(m)+"::"+k))return;
      const p=scorePick(m,k);
      if(p&&p.score>0)stablePicks.push(p);
    });
  });
  stablePicks.sort((a,b)=>b.score-a.score);

  // 取前 5 高分，每場比賽只能用一次
  const stableLegs=[];
  const stableUsed=new Set();
  for(const pick of stablePicks){
    if(stableLegs.length>=5)break;
    const mid=matchupId(pick.matchup);
    if(stableUsed.has(mid))continue;
    stableLegs.push(pick);
    stableUsed.add(mid);
  }
  // N-leg true BE = sqrt(product of min_odds_needed) — 因 min_odds = 1/hr²，1/hr = sqrt(min_odds)
  // 串 N 關 BE = ∏(1/hr_i) = ∏ sqrt(min_odds_i) = sqrt(∏ min_odds_i)
  const stableParlays=[];
  if(stableLegs.length>=3){
    const product=stableLegs.reduce((acc,l)=>acc*(l.bestMinOdds||4),1);
    stableParlays.push({legs:stableLegs,combinedMinOdds:Math.sqrt(product)});
  }

  // ═══ B區：高賠博弈 1×串5關 (本季數據) ═══
  const yoloPicks=[];
  matchups.forEach(m=>{
    ["spread_1.5","spread_2.5","total_9.5"].forEach(k=>{
      if(blocked.has(matchupId(m)+"::"+k))return;
      const p=scoreYoloPick(m,k);
      if(p)yoloPicks.push(p);
    });
  });
  yoloPicks.sort((a,b)=>b.score-a.score);

  const yoloLegs=[];
  const yoloUsed=new Set();
  for(const pick of yoloPicks){
    if(yoloLegs.length>=5)break;
    const mid=matchupId(pick.matchup);
    if(yoloUsed.has(mid))continue;
    yoloLegs.push(pick);
    yoloUsed.add(mid);
  }
  const yoloParlay=yoloLegs.length>=3?{legs:yoloLegs,combinedMinOdds:null}:null;

  return{stableParlays,yoloParlay,totalStable:stablePicks.length,totalYolo:yoloPicks.length};
}

// ─── Odds API (the-odds-api.com) ───
function findLegOdds(leg,gamesOdds){
  if(!gamesOdds||!gamesOdds.length)return null;
  const m=leg.matchup;
  const bt=leg.bt;
  const btKey=leg.btKey;

  // Match game by exact English team names
  const game=gamesOdds.find(g=>g.home_team===m.home&&g.away_team===m.away);
  if(!game)return null;

  // Determine which market + outcome to look for
  let marketKey,matchName,matchPoint=null;
  if(btKey==="ml"){
    marketKey="h2h";
    matchName=bt.predicted==="home"?m.home:m.away;
  }else if(btKey.startsWith("spread_")){
    marketKey="spreads";
    matchPoint=parseFloat(btKey.split("_")[1]);
    matchName=bt.predicted==="home"?m.home:m.away;
  }else if(btKey.startsWith("total_")){
    marketKey="totals";
    matchPoint=parseFloat(btKey.split("_")[1]);
    matchName=bt.predicted==="over"?"Over":"Under";
  }else return null;

  // Collect all matching prices from all bookmakers
  const prices=[];
  for(const book of game.bookmakers||[]){
    const market=book.markets?.find(mk=>mk.key===marketKey);
    if(!market)continue;
    for(const oc of market.outcomes||[]){
      if(oc.name!==matchName)continue;
      if(matchPoint!==null&&Math.abs((oc.point??999)-matchPoint)>0.01&&Math.abs(Math.abs(oc.point??999)-matchPoint)>0.01)continue;
      prices.push({book:book.key,price:oc.price});
    }
  }
  if(!prices.length)return null;

  const avg=prices.reduce((a,p)=>a+p.price,0)/prices.length;
  const best=Math.max(...prices.map(p=>p.price));
  return{avg,best,count:prices.length,commence:game.commence_time};
}

  return<div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bd}`,marginTop:10,marginBottom:10}}>
    <div style={{fontSize:14,fontWeight:700,color:C.acc,marginBottom:12,textAlign:"center"}}>⚾ 先發投手近況</div>
    <div style={{display:"flex",gap:10}}>
      {renderStarts(away,awayZh,awayRecent,C.g)}
      {renderStarts(home,homeZh,homeRecent,C.acc)}
    </div>
  </div>;
}

// ─── Recommend Panel ───
function RecommendPanel({matchups,uid,state,setState}){
  const mono={fontFamily:"'JetBrains Mono',monospace"};
  const result=state.result;
  const oddsData=state.oddsData;
  const oddsTime=state.oddsTime;
  const[apiKey,setApiKey]=useState(()=>load("odds-api-key","")||"");
  const[oddsLoading,setOddsLoading]=useState(false);
  const[oddsError,setOddsError]=useState("");
  const[showKeyInput,setShowKeyInput]=useState(false);
  const[excludes,setExcludes]=useState(()=>new Set());

  useEffect(()=>{
    if(!uid)return;
    const ref=db.collection("users").doc(uid).collection("meta").doc("oddsApiKey");
    const unsub=ref.onSnapshot(snap=>{
      if(snap.exists){const k=snap.data().key;if(k&&k!==apiKey){setApiKey(k);save("odds-api-key",k)}}
    },err=>console.error("Odds key sync error:",err));
    return()=>unsub();
  },[uid]);

  const matchupId=(m)=>`${m.away}@${m.home}`;
  const btLabelForEx=(bk)=>{const m={"ml":"不讓分","spread_1.5":"讓1.5","spread_2.5":"讓2.5","total_7.5":"大小7.5","total_8.5":"大小8.5","total_9.5":"大小9.5"};return m[bk]||bk};

  const generate=(excl)=>{
    const ex=excl instanceof Set?excl:excludes;
    const r=generateRecommendations(matchups,ex);
    setState(s=>({...s,result:r}));
  };

  const excludeLeg=(m,btKey)=>{
    const mid=matchupId(m);
    const next=new Set(excludes);
    next.add(mid+"::"+btKey);
    // Cascade: total lines
    if(btKey==="total_9.5"){next.add(mid+"::total_8.5");next.add(mid+"::total_7.5")}
    if(btKey==="total_8.5"){next.add(mid+"::total_7.5")}
    setExcludes(next);
    generate(next);
  };

  const restoreExclude=(exKey)=>{
    const next=new Set(excludes);
    next.delete(exKey);
    setExcludes(next);
    generate(next);
  };

  const clearExcludes=()=>{
    setExcludes(new Set());
    generate(new Set());
  };

  const saveApiKey=async(k)=>{
    setApiKey(k);save("odds-api-key",k);
    if(uid){try{await db.collection("users").doc(uid).collection("meta").doc("oddsApiKey").set({key:k,updatedAt:new Date().toISOString()})}catch(e){}}
  };

  const fetchOdds=async()=>{
    if(!apiKey.trim()){setOddsError("請先輸入 API key");setShowKeyInput(true);return}
    setOddsLoading(true);setOddsError("");
    try{
      const res=await fetch(`https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey=${apiKey.trim()}&regions=us&markets=h2h,spreads,totals&oddsFormat=decimal`);
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const json=await res.json();
      setState(s=>({...s,oddsData:json,oddsTime:new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei"})}));
    }catch(e){setOddsError("抓取失敗："+e.message)}
    setOddsLoading(false);
  };

  const btLabelMap={};
  BET_TYPES.forEach(b=>{btLabelMap[b.key]=b.short});

  // Render a single leg card
  const renderLeg=(leg,li,legOdds,isYolo)=>{
    const m=leg.matchup;const bt=leg.bt;
    const awayZh=m.away_zh||m.away;const homeZh=m.home_zh||m.home;
    const predictedZh=formatPrediction(bt.predicted,awayZh,homeZh);
    const btShort=btLabelMap[leg.btKey]||leg.btKey;
    const odds=legOdds;
    const tagBg=isYolo?"rgba(139,92,246,0.15)":"rgba(245,158,11,0.12)";
    const tagCol=isYolo?"#a78bfa":C.acc;
    return<div key={li} style={{background:C.bg,borderRadius:8,padding:"10px 12px",border:`1px solid ${C.bd}`,marginBottom:6,position:"relative"}}>
      <button onClick={()=>excludeLeg(m,leg.btKey)} title="排除此盤口" style={{position:"absolute",top:6,right:6,background:"none",border:"none",color:C.m,cursor:"pointer",fontSize:14,padding:0,outline:"none",lineHeight:1}}>✕</button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,paddingRight:20}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:C.m,fontWeight:700}}>L{li+1}</span>
          <span style={{fontSize:13,fontWeight:600}}>{awayZh} @ {homeZh}</span>
          <span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:tagBg,color:tagCol,fontWeight:600}}>{btShort}</span>
          {!isYolo&&(bt.is_top_5_pct?<span style={{fontSize:10,color:C.acc,fontWeight:700}}>🔥Top5%</span>:bt.is_top_10_pct&&<span style={{fontSize:10,color:C.g,fontWeight:700}}>⭐Top10%</span>)}
        </div>
        <span style={{fontSize:11,color:C.d,...mono}}>分 {leg.score.toFixed(0)}</span>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12}}>
        <span style={{color:C.d}}>預測 <span style={{color:isYolo?"#a78bfa":C.g,fontWeight:700}}>{predictedZh}</span></span>
        {!isYolo&&<span style={{color:C.d}}>
          信心 {confidenceStars(bt.confidence)} <span style={{color:C.m}}>·</span>
          {leg.filterCount>0?<> 符合 {leg.filterCount} 個篩選</>:" 無符合篩選"}
        </span>}
      </div>
      {(()=>{
        const sc=m.series_context;
        if(!sc||sc.is_opener)return null;
        const hw=sc.home_series_wins_before||0;
        const aw=sc.away_series_wins_before||0;
        if(hw===aw)return null;
        const leader=hw>aw?"home":"away";
        const leaderZh=leader==="home"?homeZh:awayZh;
        const aligned=leader===bt.predicted;
        const isDirectional=leg.btKey==="ml"||leg.btKey==="handi"||leg.btKey.startsWith("spread_");
        if(!isDirectional)return null;
        return<div style={{fontSize:10,marginTop:3,color:aligned?C.g:C.acc,...mono}}>
          {aligned?"✓":"⚠"} {leaderZh}系列賽領先 {hw>aw?`${hw}-${aw}`:`${aw}-${hw}`}
          {aligned?" (+2.3pp 歷史勝率)":" · 推薦方向與領先隊相反"}
        </div>;
      })()}
      {!isYolo&&leg.bestHitRate>0&&<div style={{fontSize:11,color:C.d,marginTop:2,...mono}}>
        最佳篩選歷史命中 <span style={{color:C.g,fontWeight:700}}>{leg.bestHitRate.toFixed(1)}%</span>
        {leg.bestMinOdds&&<> · 該腳最低賠率 <span style={{color:C.acc}}>{leg.bestMinOdds.toFixed(2)}</span></>}
      </div>}
      {isYolo&&(()=>{
        const tc=m.team_comparisons||{};
        const rf=m.team_recent_form;
        if(leg.btKey==="total_9.5"){
          const et=m.expected_total;
          const avgOver=rf?.away?.over_9_5_rate!=null&&rf?.home?.over_9_5_rate!=null?(rf.away.over_9_5_rate+rf.home.over_9_5_rate)/2:null;
          return<div style={{fontSize:11,color:C.d,marginTop:4,...mono}}>
            {et!=null&&<>預期總分 <span style={{color:et>=8.5?C.g:et>=7.5?C.acc:C.d,fontWeight:700}}>{et.toFixed(2)}</span> · </>}
            {m.venue?.park_factor&&<>PF {m.venue.park_factor.toFixed(3)}</>}
            {avgOver!=null&&<><br/>近15場 Over9.5 均值 <span style={{color:avgOver>=0.5?C.g:C.d,fontWeight:700}}>{(avgOver*100).toFixed(0)}%</span>
              {rf?.away?.over_9_5_rate!=null&&<> (客{(rf.away.over_9_5_rate*100).toFixed(0)}%/主{(rf.home.over_9_5_rate*100).toFixed(0)}%)</>}
            </>}
          </div>;
        }else{
          // spread pick: show recent blowout signal
          const predicted=leg.bt.predicted;
          const strong=predicted;const weak=predicted==="away"?"home":"away";
          const bwS=rf?.[strong]?.blowout_win_rate;
          const blW=rf?.[weak]?.blowout_loss_rate;
          const rpgA=tc.runs_per_game?.away;const rpgH=tc.runs_per_game?.home;
          return<div style={{fontSize:11,color:C.d,marginTop:4,...mono}}>
            RPG {rpgA?.toFixed(1)||"?"}/{rpgH?.toFixed(1)||"?"}
            {m.venue?.park_factor&&<> · PF {m.venue.park_factor.toFixed(3)}</>}
            {(bwS!=null||blW!=null)&&<><br/>近15場 強隊勝≥3分 <span style={{color:bwS>=0.4?C.g:C.d,fontWeight:700}}>{bwS!=null?(bwS*100).toFixed(0)+"%":"?"}</span> · 弱隊輸≥3分 <span style={{color:blW>=0.4?C.g:C.d,fontWeight:700}}>{blW!=null?(blW*100).toFixed(0)+"%":"?"}</span></>}
          </div>;
        }
      })()}
      {oddsData&&<div style={{marginTop:6,paddingTop:6,borderTop:`1px dashed ${C.bd}`,fontSize:11,...mono}}>
        {odds?<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:C.b}}>🌏 國際盤</span>
          <span>
            <span style={{color:C.d}}>均值 </span><span style={{color:C.t,fontWeight:700}}>{odds.avg.toFixed(2)}</span>
            <span style={{color:C.m}}> · </span>
            <span style={{color:C.d}}>最佳 </span><span style={{color:C.g,fontWeight:700}}>{odds.best.toFixed(2)}</span>
            <span style={{color:C.m,marginLeft:4}}>({odds.count}家)</span>
          </span>
        </div>:<div style={{color:C.m}}>🌏 國際盤：無對應盤口</div>}
      </div>}
      <SpRecentPanel away={m.away_sp} home={m.home_sp} awayZh={awayZh} homeZh={homeZh} awayRecent={m.away_sp_recent} homeRecent={m.home_sp_recent} collapsible/>
    </div>;
  };

  // Render a parlay card
  const renderParlay=(parlay,pi,title,titleColor,borderColor,bgColor,isYolo)=>{
    const avgScore=parlay.legs.reduce((a,l)=>a+l.score,0)/parlay.legs.length;
    const legOdds=parlay.legs.map(l=>findLegOdds(l,oddsData));
    const allMatched=legOdds.every(o=>o!==null);
    let combinedAvg=null,combinedBest=null;
    if(oddsData&&allMatched){
      combinedAvg=legOdds.reduce((a,o)=>a*o.avg,1);
      combinedBest=legOdds.reduce((a,o)=>a*o.best,1);
    }
    // Monte Carlo true win rate (cached on parlay object to avoid re-sim each render)
    if(!parlay._mc){
      parlay._mc=simulateParlay(parlay.legs,isYolo?3000:5000);
    }
    const mc=parlay._mc;

    return<div key={pi} style={{background:bgColor,borderRadius:10,padding:14,border:`2px solid ${borderColor}`,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:14,fontWeight:700,color:titleColor}}>{title}</div>
        <div style={{fontSize:11,color:C.d}}>平均分數 <span style={{...mono,color:C.t,fontWeight:700}}>{avgScore.toFixed(0)}</span></div>
      </div>
      {parlay.legs.map((leg,li)=>renderLeg(leg,li,legOdds[li],isYolo))}
      {/* Summary */}
      <div style={{borderTop:`1px solid ${C.bd}`,paddingTop:8,marginTop:6}}>
        {!isYolo&&parlay.combinedMinOdds&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,color:C.d}}>損益平衡賠率</span>
          <span style={{fontSize:15,fontWeight:700,...mono,color:C.acc}}>{parlay.combinedMinOdds.toFixed(2)}</span>
        </div>}
        {/* Monte Carlo win rate */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
          <span style={{fontSize:12,color:C.d}}>🎲 真實勝率 (Poisson 模擬)</span>
          <span style={{fontSize:15,fontWeight:700,...mono,color:mc.combined>=0.2?C.g:mc.combined>=0.1?C.acc:C.r}}>{(mc.combined*100).toFixed(1)}%</span>
        </div>
        <div style={{fontSize:10,color:C.m,marginTop:2,...mono}}>
          每腳: {mc.legProbs.map(p=>(p*100).toFixed(0)+"%").join(" × ")}
        </div>
        {oddsData&&allMatched&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
            <span style={{fontSize:12,color:C.b}}>🌏 合計賠率 (均值)</span>
            <span style={{fontSize:15,fontWeight:700,...mono,color:C.t}}>{combinedAvg.toFixed(2)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:2}}>
            <span style={{fontSize:11,color:C.d}}>合計賠率 (最佳)</span>
            <span style={{fontSize:13,fontWeight:600,...mono,color:C.g}}>{combinedBest.toFixed(2)}</span>
          </div>
        </>}
        {oddsData&&!allMatched&&<div style={{fontSize:10,color:C.m,marginTop:4,textAlign:"right"}}>部分腳位無國際盤對應</div>}
      </div>
    </div>;
  };

  return<div>
    {/* Intro */}
    <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bd}`,marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,color:C.acc,marginBottom:8}}>🎰 組合推薦</div>
      <div style={{fontSize:12,color:C.d,lineHeight:1.6}}>
        <span style={{color:C.g}}>A 穩健推薦</span>：1 單 × 串 5 關，依 10 年歷史指標計算信心分數<br/>
        <span style={{color:"#a78bfa"}}>B 高賠博弈</span>：1 單 × 串 5 關，依本季球隊火力 + 牛棚 + 先發近況，偏重讓分 2.5 / 大分 9.5
      </div>
    </div>

    {/* Generate button */}
    <button onClick={generate} disabled={!matchups||matchups.length===0} style={{width:"100%",padding:14,borderRadius:10,border:"none",fontSize:15,fontWeight:700,background:matchups&&matchups.length>0?C.acc:C.m,color:matchups&&matchups.length>0?"#000":C.d,cursor:matchups&&matchups.length>0?"pointer":"default",outline:"none",marginBottom:12}}>
      一鍵生成推薦（2 組串 5 關）
    </button>

    {/* International Odds */}
    <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bd}`,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:700,color:C.b}}>🌏 國際盤賠率</div>
        <button onClick={()=>setShowKeyInput(!showKeyInput)} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:11}}>{apiKey?"已設定 ✓":"設定 API Key"}</button>
      </div>
      {showKeyInput&&<div style={{marginBottom:10}}>
        <Inp value={apiKey} onChange={saveApiKey} placeholder="貼上 the-odds-api.com 的 API key" mono/>
      </div>}
      <button onClick={fetchOdds} disabled={oddsLoading||!apiKey} style={{width:"100%",padding:10,borderRadius:8,border:`1px solid ${C.b}`,background:oddsLoading||!apiKey?"transparent":"rgba(59,130,246,0.1)",color:oddsLoading||!apiKey?C.m:C.b,fontSize:13,fontWeight:600,cursor:oddsLoading||!apiKey?"default":"pointer",outline:"none"}}>
        {oddsLoading?"抓取中...":"抓取國際盤賠率"}
      </button>
      {oddsError&&<div style={{fontSize:11,color:C.r,marginTop:6}}>{oddsError}</div>}
      {oddsData&&<div style={{fontSize:11,color:C.g,marginTop:6}}>✓ 已抓取 {oddsData.length} 場 · {oddsTime}</div>}
    </div>

    {/* Excluded list */}
    {excludes.size>0&&<div style={{background:C.card,borderRadius:10,padding:"10px 14px",border:`1px solid ${C.bd}`,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:600,color:C.d}}>已排除 ({excludes.size})</span>
        <button onClick={clearExcludes} style={{background:"none",border:"none",color:C.m,cursor:"pointer",fontSize:11}}>全部還原</button>
      </div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {[...excludes].map(ex=>{
          const[mid,bk]=ex.split("::");
          const mLabel=matchups.find(m=>matchupId(m)===mid);
          const teamLabel=mLabel?`${mLabel.away_zh||""}@${mLabel.home_zh||""}`:(mid||"");
          return<span key={ex} style={{display:"inline-flex",alignItems:"center",gap:4,background:C.bg,border:`1px solid ${C.bd}`,borderRadius:6,padding:"3px 8px",fontSize:11}}>
            <span style={{color:C.d}}>{teamLabel} {btLabelForEx(bk)}</span>
            <button onClick={()=>restoreExclude(ex)} style={{background:"none",border:"none",color:C.acc,cursor:"pointer",fontSize:12,padding:0,lineHeight:1}}>↩</button>
          </span>;
        })}
      </div>
    </div>}

    {/* Results */}
    {result&&<div>
      {/* A: Stable 5-leg parlay */}
      <div style={{fontSize:13,fontWeight:700,color:C.g,marginBottom:8}}>🛡️ A 穩健推薦 · 串 5 關</div>
      {result.stableParlays.length===0?<div style={{textAlign:"center",padding:20,color:C.d,fontSize:12,marginBottom:12}}>
        穩健場次不足（可用 {result.totalStable} 場，需至少 3 場）
      </div>:<>
        {result.stableParlays.map((p,i)=>{
          const anyTop5=p.legs.some(l=>l.bt.is_top_5_pct);
          const allTop10=p.legs.every(l=>l.bt.is_top_10_pct||l.bt.is_top_5_pct);
          const icon=anyTop5?"🔥 ":allTop10?"⭐ ":"";
          return renderParlay(p,i,`${icon}穩健 · 串 ${p.legs.length} 關`,anyTop5?C.acc:allTop10?C.g:C.acc,anyTop5?C.acc:allTop10?C.g:C.bd,anyTop5?"rgba(245,158,11,0.06)":allTop10?"rgba(16,185,129,0.06)":C.card,false);
        })}
      </>}

      {/* B: YOLO parlay */}
      <div style={{fontSize:13,fontWeight:700,color:"#a78bfa",marginTop:16,marginBottom:8}}>🎲 B 高賠博弈 · 串 5 關</div>
      <div style={{fontSize:11,color:C.d,marginBottom:8,lineHeight:1.5}}>
        ⚠️ 風險極高 · 依本季球隊火力、牛棚疲勞、先發近況選出高賠組合
      </div>
      {!result.yoloParlay?<div style={{textAlign:"center",padding:20,color:C.d,fontSize:12}}>
        高賠場次不足（可用 {result.totalYolo} 場，需至少 3 場）
      </div>:renderParlay(result.yoloParlay,99,"🎲 高賠一搏 · 串 "+result.yoloParlay.legs.length+" 關","#a78bfa","#7c3aed","rgba(139,92,246,0.06)",true)}
    </div>}
  </div>;
}
