// ─── MLB API Fetch ───
const MLB_API="https://statsapi.mlb.com/api/v1";

async function fetchMLBGames(dateStr){
  // 1. Get schedule with linescore & decisions
  const schRes=await fetch(`${MLB_API}/schedule?date=${dateStr}&sportId=1&hydrate=linescore,decisions`);
  const sch=await schRes.json();
  if(!sch.dates||!sch.dates.length)return[];
  const gamesRaw=sch.dates[0].games.filter(g=>g.status.detailedState==="Final"||g.status.detailedState.startsWith("Completed"));

  // 2. For each game, fetch boxscore + playByPlay in parallel
  const results=await Promise.all(gamesRaw.map(async g=>{
    const[boxRes,pbpRes]=await Promise.all([
      fetch(`${MLB_API}/game/${g.gamePk}/boxscore`),
      fetch(`${MLB_API}/game/${g.gamePk}/playByPlay`)
    ]);
    const box=await boxRes.json();
    const pbp=await pbpRes.json();

    const awayId=g.teams.away.team.id,homeId=g.teams.home.team.id;
    const ls=g.linescore;

    // Innings
    const innings=(ls?.innings||[]).map(inn=>({
      num:inn.num,
      away:inn.away?.runs??0,
      home:inn.home?.runs??0
    }));

    // Starting pitchers (first in pitchers array)
    const extractSP=(side)=>{
      const t=box.teams[side];
      const spId=t.pitchers?.[0];
      if(!spId)return null;
      const p=t.players?.["ID"+spId];
      if(!p)return null;
      const s=p.stats?.pitching||{};
      return{
        name:p.person?.fullName||"?",
        ip:s.inningsPitched||"0",h:s.hits||0,r:s.runs||0,er:s.earnedRuns||0,
        bb:s.baseOnBalls||0,so:s.strikeOuts||0,hr:s.homeRuns||0,
        pitches:s.numberOfPitches||0,strikes:s.strikes||0
      };
    };

    // Home runs from play-by-play
    const homeRuns=(pbp.allPlays||[])
      .filter(p=>p.result?.event==="Home Run")
      .map(p=>p.result?.description||"");

    // Decisions
    const dec=g.decisions||{};

    return{
      id:"mlb-"+g.gamePk,
      date:dateStr,
      away:teamZh(awayId),home:teamZh(homeId),
      awayEn:teamEn(awayId),homeEn:teamEn(homeId),
      awayScore:ls?.teams?.away?.runs??0,
      homeScore:ls?.teams?.home?.runs??0,
      awayHits:ls?.teams?.away?.hits??0,homeHits:ls?.teams?.home?.hits??0,
      awayErrors:ls?.teams?.away?.errors??0,homeErrors:ls?.teams?.home?.errors??0,
      innings,
      spAway:extractSP("away"),spHome:extractSP("home"),
      winner:dec.winner?.fullName||"",loser:dec.loser?.fullName||"",
      save:dec.save?.fullName||"",
      homeRuns,
      note:"",
      createdAt:new Date().toISOString()
    };
  }));
  return results;
}

// ─── Bet logic ───
function determineResult(leg,hs,as){
  const h=Number(hs),a=Number(as);if(isNaN(h)||isNaN(a))return"pending";
  const t=h+a;
  if(leg.market==="normal"){if(h===a)return"push";return(leg.selection==="home"&&h>a)||(leg.selection==="away"&&a>h)?"win":"lose"}
  if(leg.market==="handi"){const s=Number(leg.line),adj=h+s;if(adj===a)return"push";return(leg.selection==="home"&&adj>a)||(leg.selection==="away"&&a>adj)?"win":"lose"}
  if(leg.market==="total"){const l=Number(leg.line);if(t===l)return"push";return(leg.selection==="over"&&t>l)||(leg.selection==="under"&&t<l)?"win":"lose"}
  return"pending";
}
function calcPayout(bet){
  const legs=bet.legs,all=legs.every(l=>l.result!=="pending"),any=legs.some(l=>l.result==="lose");
  if(!all)return{status:"pending",profit:0};if(any)return{status:"lose",profit:-bet.amount};
  const e=legs.reduce((a,l)=>a*(l.result==="push"?1:l.odds),1);
  return{status:"win",profit:Math.round(bet.amount*e)-bet.amount};
}

// ─── DatePicker ───
function DatePicker({value,onChange}){
  const ref=useRef(null);
  const[open,setOpen]=useState(false);
  const parsed=value?value.split("-").map(Number):[null,null,null];
  const[viewY,setViewY]=useState(parsed[0]||new Date().getFullYear());
  const[viewM,setViewM]=useState(parsed[1]||new Date().getMonth()+1);

  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",h);document.addEventListener("touchstart",h);
    return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h)};
  },[open]);

  useEffect(()=>{
    if(open&&value){const p=value.split("-").map(Number);setViewY(p[0]);setViewM(p[1])}
  },[open]);

  const daysInMonth=(y,m)=>new Date(y,m,0).getDate();
  const firstDay=(y,m)=>new Date(y,m-1,1).getDay();
  const pad=n=>String(n).padStart(2,"0");
  const fmt=value?`${parsed[0]}/${pad(parsed[1])}/${pad(parsed[2])}`:"選擇日期";

  const prevM=()=>{if(viewM===1){setViewM(12);setViewY(viewY-1)}else setViewM(viewM-1)};
  const nextM=()=>{if(viewM===12){setViewM(1);setViewY(viewY+1)}else setViewM(viewM+1)};

  const days=daysInMonth(viewY,viewM);
  const start=firstDay(viewY,viewM);
  const weeks=["日","一","二","三","四","五","六"];
  const cells=[];
  for(let i=0;i<start;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(d);

  const selDay=(d)=>{
    onChange(`${viewY}-${pad(viewM)}-${pad(d)}`);
    setOpen(false);
  };

  const isToday=(d)=>{const t=new Date();return viewY===t.getFullYear()&&viewM===t.getMonth()+1&&d===t.getDate()};
  const isSel=(d)=>value===`${viewY}-${pad(viewM)}-${pad(d)}`;

  return<div ref={ref} style={{position:"relative"}}>
    <button onClick={()=>setOpen(!open)} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.bd}`,background:C.bg,color:value?C.t:C.m,fontSize:14,textAlign:"left",cursor:"pointer",outline:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span>{fmt}</span><span style={{color:C.d,fontSize:12}}>📅</span>
    </button>
    {open&&<div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:C.card,border:`1px solid ${C.bd}`,borderRadius:10,padding:12,zIndex:100,boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <button onClick={()=>setViewY(viewY-1)} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>«</button>
        <button onClick={prevM} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>‹</button>
        <span style={{fontSize:14,fontWeight:700,color:C.t}}>{viewY}年 {viewM}月</span>
        <button onClick={nextM} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>›</button>
        <button onClick={()=>setViewY(viewY+1)} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>»</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center"}}>
        {weeks.map(w=><div key={w} style={{fontSize:11,color:C.m,padding:"4px 0",fontWeight:600}}>{w}</div>)}
        {cells.map((d,i)=>d?<button key={i} onClick={()=>selDay(d)} style={{padding:"6px 0",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,fontWeight:isSel(d)?700:400,background:isSel(d)?C.acc:isToday(d)?"rgba(245,158,11,0.15)":"transparent",color:isSel(d)?"#000":isToday(d)?C.acc:C.t,outline:"none",transition:"background .1s"}}>{d}</button>:<div key={i}/>)}
      </div>
      <div style={{display:"flex",justifyContent:"center",marginTop:8}}>
        <button onClick={()=>{const t=todayStr();onChange(t);const p=t.split("-").map(Number);setViewY(p[0]);setViewM(p[1]);setOpen(false)}} style={{background:"none",border:`1px solid ${C.bd}`,borderRadius:6,padding:"4px 12px",color:C.acc,cursor:"pointer",fontSize:12,outline:"none"}}>今天</button>
      </div>
    </div>}
  </div>;
}
function Sel({value,onChange,options,placeholder}){return<select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.bd}`,background:C.bg,color:value?C.t:C.m,fontSize:14,boxSizing:"border-box",outline:"none"}}><option value="">{placeholder||"請選擇"}</option>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>}

// ADD BET VIEW
// ═══════════════════════════════════════
function AddBetView({addBet}){
  const empty=()=>({id:genId(),away:"",home:"",market:"normal",selection:"",line:"",odds:"",homeScore:"",awayScore:""});
  const[type,setType]=useState("single");
  const[date,setDate]=useState(todayStr());
  const[legs,setLegs]=useState([empty()]);
  const[amt,setAmt]=useState("");
  const[note,setNote]=useState("");
  const upLeg=(i,l)=>setLegs(p=>p.map((x,j)=>j===i?l:x));
  const rmLeg=i=>setLegs(p=>p.filter((_,j)=>j!==i));
  const addLeg=()=>{if(legs.length<5)setLegs(p=>[...p,empty()])};
  const valid=()=>amt&&Number(amt)>0&&legs.every(l=>l.away&&l.home&&l.selection&&l.odds&&Number(l.odds)>0);
  const tOdds=legs.reduce((a,l)=>a*(Number(l.odds)||1),1);
  const submit=()=>{
    if(!valid())return;
    const mk=l=>{const wl={...l,date};const res=(wl.homeScore!==""&&wl.awayScore!=="")?determineResult(wl,wl.homeScore,wl.awayScore):"pending";return{...wl,odds:Number(wl.odds),result:res}};
    if(type==="single")legs.forEach(l=>addBet({id:genId(),type:"single",legs:[mk(l)],amount:Number(amt),totalOdds:Number(l.odds),note,createdAt:new Date().toISOString()}));
    else addBet({id:genId(),type:"parlay",legs:legs.map(mk),amount:Number(amt),totalOdds:Math.round(tOdds*100)/100,note,createdAt:new Date().toISOString()});
    setLegs([empty()]);setAmt("");setNote("");
  };

  return<div>
    <div style={{fontSize:16,fontWeight:700,marginBottom:14}}>新增投注紀錄</div>
    <Field label="投注類型"><div style={{display:"flex",gap:8}}>
      <Pill sel={type==="single"} onClick={()=>{setType("single");if(legs.length>1)setLegs([legs[0]])}}>單場</Pill>
      <Pill sel={type==="parlay"} onClick={()=>{setType("parlay");if(legs.length<2)setLegs([...legs,empty()])}}>串關</Pill>
    </div></Field>

    <Field label="比賽日期"><DatePicker value={date} onChange={setDate}/></Field>

    {legs.map((leg,i)=><LegEdit key={leg.id} leg={leg} idx={i} onChange={l=>upLeg(i,l)} onRemove={()=>rmLeg(i)} canRemove={type==="parlay"&&legs.length>2}/>)}

    {type==="parlay"&&legs.length<5&&<button onClick={addLeg} style={{width:"100%",padding:10,borderRadius:8,border:`1px dashed ${C.bd}`,background:"transparent",color:C.d,cursor:"pointer",fontSize:13,marginBottom:12}}>＋ 新增一關（{legs.length}/5）</button>}
    {type==="parlay"&&legs.length>=2&&legs.every(l=>Number(l.odds)>0)&&<div style={{background:C.accD,borderRadius:8,padding:"10px 16px",marginBottom:12,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:C.acc}}>串{legs.length}關總賠率</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:C.acc,fontSize:17}}>{tOdds.toFixed(2)}</span></div>}

    <Field label="投注金額（NT$）"><Inp value={amt} onChange={setAmt} placeholder="100" type="number" mono/></Field>
    {amt&&Number(amt)>0&&<div style={{fontSize:13,color:C.g,marginBottom:12,marginTop:-6}}>預估獎金：NT$ {Math.round(Number(amt)*tOdds).toLocaleString()}</div>}
    <Field label="備註（選填）"><Inp value={note} onChange={setNote} placeholder="先發投手、觀察筆記..."/></Field>
    <button onClick={submit} disabled={!valid()} style={{width:"100%",padding:14,borderRadius:10,border:"none",fontSize:15,fontWeight:700,background:valid()?C.acc:C.m,color:valid()?"#000":C.d,cursor:valid()?"pointer":"default",outline:"none"}}>
      {type==="parlay"?`確認送出（串${legs.length}關）`:"確認送出"}
    </button>
  </div>;
}

function LegEdit({leg,idx,onChange,onRemove,canRemove}){
  const u=(f,v)=>onChange({...leg,[f]:v});
  return<div style={{background:C.card,borderRadius:10,padding:14,marginBottom:10,border:`1px solid ${C.bd}`,position:"relative"}}>
    {canRemove&&<button onClick={onRemove} style={{position:"absolute",top:8,right:10,background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>}
    <div style={{fontSize:12,color:C.acc,fontWeight:700,marginBottom:10}}>第{idx+1}關</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <Field label="客隊"><Sel value={leg.away} onChange={v=>u("away",v)} options={TEAMS} placeholder="客隊"/></Field>
      <Field label="主隊"><Sel value={leg.home} onChange={v=>u("home",v)} options={TEAMS} placeholder="主隊"/></Field>
    </div>
    <Field label="玩法"><div style={{display:"flex",gap:8}}>
      {[["normal","不讓分"],["handi","讓分"],["total","大小分"]].map(([k,l])=><Pill key={k} sel={leg.market===k} onClick={()=>u("market",k)}>{l}</Pill>)}
    </div></Field>
    {(leg.market==="handi"||leg.market==="total")&&<Field label={leg.market==="handi"?"讓分值（例：-1.5）":"總分線（例：8.5）"}><Inp value={leg.line} onChange={v=>u("line",v)} placeholder={leg.market==="handi"?"-1.5":"8.5"} mono/></Field>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <Field label="方向">{leg.market==="total"?<div style={{display:"flex",gap:8}}><Pill sel={leg.selection==="over"} onClick={()=>u("selection","over")}>大</Pill><Pill sel={leg.selection==="under"} onClick={()=>u("selection","under")}>小</Pill></div>:<div style={{display:"flex",gap:8}}><Pill sel={leg.selection==="away"} onClick={()=>u("selection","away")}>{leg.away||"客"}</Pill><Pill sel={leg.selection==="home"} onClick={()=>u("selection","home")}>{leg.home||"主"}</Pill></div>}</Field>
      <Field label="賠率"><Inp value={leg.odds} onChange={v=>u("odds",v)} placeholder="1.75" mono/></Field>
    </div>
    <div style={{borderTop:`1px dashed ${C.bd}`,marginTop:8,paddingTop:10}}>
      <div style={{fontSize:11,color:C.m,marginBottom:6}}>比賽結果（賽後填）</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label={`${leg.away||"客"} 分`} style={{marginBottom:0}}><Inp value={leg.awayScore} onChange={v=>u("awayScore",v)} placeholder="—" type="number" mono style={{textAlign:"center"}}/></Field>
        <Field label={`${leg.home||"主"} 分`} style={{marginBottom:0}}><Inp value={leg.homeScore} onChange={v=>u("homeScore",v)} placeholder="—" type="number" mono style={{textAlign:"center"}}/></Field>
      </div>
    </div>
  </div>;
}

function HistView({bets,updateBet,deleteBet}){
  const[filter,setFilter]=useState("all");
  const ML={normal:"不讓分",handi:"讓分",total:"大小分"};
  const filtered=bets.filter(b=>filter==="all"||calcPayout(b).status===filter);
  if(!bets.length)return<div style={{textAlign:"center",padding:"60px 20px",color:C.d}}><div style={{fontSize:40,marginBottom:12}}>📋</div><div>尚無投注紀錄</div></div>;
  return<div>
    <div style={{fontSize:16,fontWeight:700,marginBottom:14}}>投注紀錄</div>
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>{[["all","全部"],["pending","未結算"],["win","贏"],["lose","輸"]].map(([k,l])=><Pill key={k} sel={filter===k} onClick={()=>setFilter(k)}>{l}</Pill>)}</div>
    {filtered.map(bet=>{const r=calcPayout(bet);return<BetCard key={bet.id} bet={bet} r={r} updateBet={updateBet} deleteBet={deleteBet} ML={ML}/>})}
    <div style={{textAlign:"center",fontSize:12,color:C.m,padding:12}}>共 {filtered.length} 筆</div>
  </div>;
}

function BetCard({bet,r,updateBet,deleteBet,ML}){
  const[mode,setMode]=useState("view"); // view | score | edit
  const sc=r.status==="win"?C.g:r.status==="lose"?C.r:C.m;
  const upScore=(li,f,v)=>updateBet(bet.id,b=>{const nl=b.legs.map((l,i)=>{if(i!==li)return l;const u={...l,[f]:v};u.result=(u.homeScore!==""&&u.awayScore!=="")?determineResult(u,u.homeScore,u.awayScore):"pending";return u});return{...b,legs:nl}});
  const upLeg=(li,f,v)=>updateBet(bet.id,b=>{const nl=b.legs.map((l,i)=>{if(i!==li)return l;const u={...l,[f]:v};if(u.homeScore!==""&&u.awayScore!=="")u.result=determineResult(u,u.homeScore,u.awayScore);return u});return{...b,legs:nl,totalOdds:Math.round(nl.reduce((a,l)=>a*(Number(l.odds)||1),1)*100)/100}});
  const upAllDate=v=>updateBet(bet.id,b=>({...b,legs:b.legs.map(l=>{const u={...l,date:v};if(u.homeScore!==""&&u.awayScore!=="")u.result=determineResult(u,u.homeScore,u.awayScore);return u})}));
  const upBetField=(f,v)=>updateBet(bet.id,b=>({...b,[f]:v}));

  const eInp={padding:"4px 6px",borderRadius:4,border:`1px solid ${C.bd}`,background:C.bg,color:C.t,fontSize:12,outline:"none",boxSizing:"border-box"};

  if(mode==="edit"){
    return<div style={{background:C.card,borderRadius:10,padding:"14px 16px",marginBottom:8,border:`1px solid ${C.acc}`}}>
      <div style={{fontSize:13,fontWeight:700,color:C.acc,marginBottom:10}}>編輯投注</div>
      <Field label="比賽日期"><DatePicker value={bet.legs[0]?.date||""} onChange={upAllDate}/></Field>
      {bet.legs.map((leg,i)=><div key={i} style={{background:C.bg,borderRadius:8,padding:10,marginBottom:8,border:`1px solid ${C.bd}`}}>
        <div style={{fontSize:11,color:C.acc,fontWeight:700,marginBottom:8}}>第{i+1}關</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          <Field label="客隊"><Sel value={leg.away} onChange={v=>upLeg(i,"away",v)} options={TEAMS} placeholder="客隊"/></Field>
          <Field label="主隊"><Sel value={leg.home} onChange={v=>upLeg(i,"home",v)} options={TEAMS} placeholder="主隊"/></Field>
        </div>
        <Field label="玩法"><div style={{display:"flex",gap:6}}>
          {[["normal","不讓分"],["handi","讓分"],["total","大小分"]].map(([k,l])=><Pill key={k} sel={leg.market===k} onClick={()=>upLeg(i,"market",k)}>{l}</Pill>)}
        </div></Field>
        {(leg.market==="handi"||leg.market==="total")&&<Field label={leg.market==="handi"?"讓分值":"總分線"}><Inp value={leg.line} onChange={v=>upLeg(i,"line",v)} placeholder={leg.market==="handi"?"-1.5":"8.5"} mono/></Field>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          <Field label="方向">{leg.market==="total"?<div style={{display:"flex",gap:6}}><Pill sel={leg.selection==="over"} onClick={()=>upLeg(i,"selection","over")}>大</Pill><Pill sel={leg.selection==="under"} onClick={()=>upLeg(i,"selection","under")}>小</Pill></div>:<div style={{display:"flex",gap:6}}><Pill sel={leg.selection==="away"} onClick={()=>upLeg(i,"selection","away")}>{leg.away||"客"}</Pill><Pill sel={leg.selection==="home"} onClick={()=>upLeg(i,"selection","home")}>{leg.home||"主"}</Pill></div>}</Field>
          <Field label="賠率"><Inp value={leg.odds} onChange={v=>upLeg(i,"odds",v)} placeholder="1.75" mono/></Field>
        </div>
        <div style={{borderTop:`1px dashed ${C.bd}`,marginTop:4,paddingTop:8}}>
          <div style={{fontSize:11,color:C.m,marginBottom:6}}>比賽結果</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <Field label={`${leg.away||"客"} 分`} style={{marginBottom:0}}><Inp value={leg.awayScore} onChange={v=>upLeg(i,"awayScore",v)} placeholder="—" type="number" mono style={{textAlign:"center"}}/></Field>
            <Field label={`${leg.home||"主"} 分`} style={{marginBottom:0}}><Inp value={leg.homeScore} onChange={v=>upLeg(i,"homeScore",v)} placeholder="—" type="number" mono style={{textAlign:"center"}}/></Field>
          </div>
        </div>
      </div>)}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        <Field label="投注金額（NT$）"><Inp value={bet.amount} onChange={v=>upBetField("amount",Number(v)||0)} type="number" mono/></Field>
        <Field label="備註"><Inp value={bet.note||""} onChange={v=>upBetField("note",v)} placeholder="備註..."/></Field>
      </div>
      <button onClick={()=>setMode("view")} style={{width:"100%",padding:10,borderRadius:8,border:"none",fontSize:14,fontWeight:700,background:C.acc,color:"#000",cursor:"pointer",outline:"none"}}>✓ 完成編輯</button>
    </div>;
  }

  return<div style={{background:C.card,borderRadius:10,padding:"14px 16px",marginBottom:8,borderLeft:`3px solid ${sc}`,border:`1px solid ${r.status==="win"?"rgba(16,185,129,0.2)":r.status==="lose"?"rgba(239,68,68,0.2)":C.bd}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:4,background:bet.type==="parlay"?C.accD:C.bD,color:bet.type==="parlay"?C.acc:C.b}}>{bet.type==="parlay"?`串${bet.legs.length}關`:"單場"}</span>
        <span style={{fontSize:11,color:C.d}}>{bet.legs[0]?.date}</span>
      </div>
      {r.status!=="pending"?<span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:15,color:sc}}>{r.profit>0?"+":""}{r.profit.toLocaleString()}</span>:<span style={{fontSize:11,color:C.m,background:"rgba(75,85,99,0.2)",padding:"2px 8px",borderRadius:4}}>未結算</span>}
    </div>
    {bet.legs.map((leg,i)=><div key={i} style={{fontSize:13,padding:"6px 0",borderTop:i?`1px solid ${C.bd}`:"none"}}>
      <div style={{display:"flex",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:7,height:7,borderRadius:"50%",display:"inline-block",background:leg.result==="win"?C.g:leg.result==="lose"?C.r:C.m}}/><span>{leg.away} @ {leg.home}</span></div><span style={{fontFamily:"'JetBrains Mono',monospace",color:C.d,fontSize:12}}>{Number(leg.odds).toFixed(2)}</span></div>
      <div style={{fontSize:12,color:C.d,marginTop:2,marginLeft:13}}>{ML[leg.market]}{leg.line?` ${leg.line}`:""} → <span style={{color:C.acc}}>{leg.selection==="home"?leg.home:leg.selection==="away"?leg.away:leg.selection==="over"?"大":"小"}</span>{(leg.homeScore!==""&&leg.awayScore!=="")&&<span style={{marginLeft:8,color:C.t}}>比數 {leg.awayScore}:{leg.homeScore}</span>}</div>
      {mode==="score"&&<div style={{display:"flex",gap:8,marginTop:6,marginLeft:13,alignItems:"center"}}><span style={{fontSize:11,color:C.d}}>{leg.away}</span><input type="number" value={leg.awayScore??""} onChange={e=>upScore(i,"awayScore",e.target.value)} style={{width:44,padding:4,borderRadius:4,border:`1px solid ${C.bd}`,background:C.bg,color:C.t,textAlign:"center",fontSize:13,fontFamily:"'JetBrains Mono',monospace",outline:"none"}}/><span style={{color:C.m}}>:</span><input type="number" value={leg.homeScore??""} onChange={e=>upScore(i,"homeScore",e.target.value)} style={{width:44,padding:4,borderRadius:4,border:`1px solid ${C.bd}`,background:C.bg,color:C.t,textAlign:"center",fontSize:13,fontFamily:"'JetBrains Mono',monospace",outline:"none"}}/><span style={{fontSize:11,color:C.d}}>{leg.home}</span></div>}
    </div>)}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,paddingTop:8,borderTop:`1px solid ${C.bd}`}}>
      <span style={{fontSize:12,color:C.d}}>NT${bet.amount.toLocaleString()} × {bet.totalOdds.toFixed(2)}</span>
      <div style={{display:"flex",gap:12}}>
        <button onClick={()=>setMode(mode==="score"?"view":"score")} style={{background:"none",border:"none",color:mode==="score"?C.acc:C.d,cursor:"pointer",fontSize:12}}>{mode==="score"?"✓ 完成":"📝 填比數"}</button>
        <button onClick={()=>setMode("edit")} style={{background:"none",border:"none",color:C.b,cursor:"pointer",fontSize:12}}>✏️ 編輯</button>
        <button onClick={()=>confirm("確定刪除？")&&deleteBet(bet.id)} style={{background:"none",border:"none",color:C.m,cursor:"pointer",fontSize:12}}>刪除</button>
      </div>
    </div>
    {bet.note&&<div style={{fontSize:11,color:C.d,marginTop:6,fontStyle:"italic"}}>💬 {bet.note}</div>}
  </div>;
}

// GAME RESULTS VIEW
// ═══════════════════════════════════════
function ResultsView({games,addGames,updateGame,deleteGame}){
  const[mode,setMode]=useState("list");
  const[importDate,setImportDate]=useState(todayPT());
  const[importing,setImporting]=useState(false);
  const[importResult,setImportResult]=useState(null);
  const[listDate,setListDate]=useState(todayPT());

  const doImport=async()=>{
    setImporting(true);setImportResult(null);
    try{
      const fetched=await fetchMLBGames(importDate);
      if(!fetched.length){setImportResult({ok:false,msg:"該日無已完賽的比賽"});setImporting(false);return}
      const existIds=new Set(games.map(g=>g.id));
      const newGames=fetched.filter(g=>!existIds.has(g.id));
      if(!newGames.length){setImportResult({ok:true,msg:`${fetched.length} 場比賽皆已匯入過`});setImporting(false);return}
      await addGames(newGames);
      setImportResult({ok:true,msg:`成功匯入 ${newGames.length} 場比賽（共 ${fetched.length} 場）`});
    }catch(e){setImportResult({ok:false,msg:"匯入失敗："+e.message})}
    setImporting(false);
  };

  const filtered=games.filter(g=>g.date===listDate);

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:16,fontWeight:700}}>賽果紀錄</div>
      <div style={{display:"flex",gap:6}}><Pill sel={mode==="list"} onClick={()=>setMode("list")}>列表</Pill><Pill sel={mode==="import"} onClick={()=>setMode("import")}>匯入</Pill></div>
    </div>

    {mode==="import"&&<div style={{background:C.card,borderRadius:10,padding:16,border:`1px solid ${C.bd}`,marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>從 MLB 匯入賽果</div>
      <Field label="選擇日期（美東時間）"><DatePicker value={importDate} onChange={setImportDate}/></Field>
      <button onClick={doImport} disabled={importing} style={{width:"100%",padding:12,borderRadius:8,border:"none",fontSize:14,fontWeight:700,background:importing?C.m:C.acc,color:importing?C.d:"#000",cursor:importing?"default":"pointer",outline:"none"}}>
        {importing?"匯入中...":"匯入該日所有賽果"}
      </button>
      {importResult&&<div style={{marginTop:10,padding:"10px 14px",borderRadius:8,fontSize:13,background:importResult.ok?C.gD:C.rD,color:importResult.ok?C.g:C.r}}>{importResult.msg}</div>}
    </div>}

    {mode==="list"&&<div>
      <Field label="選擇日期"><DatePicker value={listDate} onChange={setListDate}/></Field>
      {filtered.length===0?<div style={{textAlign:"center",padding:"40px 20px",color:C.d}}><div style={{fontSize:40,marginBottom:12}}>⚾</div><div>{listDate} 無賽果紀錄</div><div style={{fontSize:13,marginTop:4}}>到「匯入」頁面抓取該日賽果</div></div>:
      filtered.map(g=><GameCard key={g.id} game={g} updateGame={updateGame} deleteGame={deleteGame}/>)}
      {filtered.length>0&&<div style={{textAlign:"center",fontSize:12,color:C.m,padding:8}}>共 {filtered.length} 場</div>}
    </div>}
  </div>;
}

function GameCard({game:g,updateGame,deleteGame}){
  const[ed,setEd]=useState(false);
  const[detail,setDetail]=useState(false);
  const[f,setF]=useState({date:g.date,away:g.away,home:g.home,awayScore:String(g.awayScore),homeScore:String(g.homeScore),note:g.note||""});
  const validG=()=>f.away&&f.home&&f.awayScore!==""&&f.homeScore!==""&&f.away!==f.home;
  const doSave=()=>{if(!validG())return;updateGame(g.id,{...g,date:f.date,away:f.away,home:f.home,awayScore:Number(f.awayScore),homeScore:Number(f.homeScore),note:f.note});setEd(false)};
  const hasMLB=!!g.innings;
  const mono={fontFamily:"'JetBrains Mono',monospace"};

  if(ed){
    return<div style={{background:C.card,borderRadius:10,padding:"12px 16px",marginBottom:6,border:`1px solid ${C.acc}`}}>
      <div style={{fontSize:13,fontWeight:700,color:C.acc,marginBottom:10}}>編輯賽果</div>
      <Field label="日期"><DatePicker value={f.date} onChange={v=>setF({...f,date:v})}/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"end"}}>
        <Field label="客隊" style={{marginBottom:0}}><Sel value={f.away} onChange={v=>setF({...f,away:v})} options={TEAMS} placeholder="客隊"/></Field>
        <div style={{padding:"10px 0",color:C.m,fontWeight:700}}>vs</div>
        <Field label="主隊" style={{marginBottom:0}}><Sel value={f.home} onChange={v=>setF({...f,home:v})} options={TEAMS} placeholder="主隊"/></Field>
      </div>
      <div style={{height:12}}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"end"}}>
        <Field label="客隊得分" style={{marginBottom:0}}><Inp value={f.awayScore} onChange={v=>setF({...f,awayScore:v})} type="number" mono style={{textAlign:"center",fontSize:20,fontWeight:700}} placeholder="0"/></Field>
        <div style={{padding:"10px 0",color:C.m,fontWeight:700,fontSize:20}}>:</div>
        <Field label="主隊得分" style={{marginBottom:0}}><Inp value={f.homeScore} onChange={v=>setF({...f,homeScore:v})} type="number" mono style={{textAlign:"center",fontSize:20,fontWeight:700}} placeholder="0"/></Field>
      </div>
      <div style={{height:12}}/>
      <Field label="備註（選填）"><Inp value={f.note} onChange={v=>setF({...f,note:v})} placeholder="先發投手..."/></Field>
      <div style={{display:"flex",gap:8}}>
        <button onClick={doSave} disabled={!validG()} style={{flex:1,padding:10,borderRadius:8,border:"none",fontSize:14,fontWeight:700,background:validG()?C.acc:C.m,color:validG()?"#000":C.d,cursor:validG()?"pointer":"default",outline:"none"}}>儲存</button>
        <button onClick={()=>{setF({date:g.date,away:g.away,home:g.home,awayScore:String(g.awayScore),homeScore:String(g.homeScore),note:g.note||""});setEd(false)}} style={{padding:"10px 16px",borderRadius:8,border:`1px solid ${C.bd}`,background:"transparent",color:C.d,cursor:"pointer",fontSize:14,outline:"none"}}>取消</button>
      </div>
    </div>;
  }

  const w=g.homeScore>g.awayScore?g.home:g.away;
  const total=g.homeScore+g.awayScore;
  const margin=Math.abs(g.homeScore-g.awayScore);
  const hdr={fontSize:11,color:C.m,padding:"4px 0",textAlign:"center",borderBottom:`1px solid ${C.bd}`};
  const cell={fontSize:11,padding:"3px 0",textAlign:"center",...mono};

  return<div style={{background:C.card,borderRadius:10,padding:"12px 16px",marginBottom:6,border:`1px solid ${C.bd}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:11,color:C.d}}>{g.date}</span>
        {g.awayEn&&<span style={{fontSize:10,color:C.m}}>{g.awayEn} @ {g.homeEn}</span>}
      </div>
      <div style={{display:"flex",gap:10}}>
        {hasMLB&&<button onClick={()=>setDetail(!detail)} style={{background:"none",border:"none",color:detail?C.acc:C.d,cursor:"pointer",fontSize:11}}>{detail?"收合":"詳細"}</button>}
        <button onClick={()=>setEd(true)} style={{background:"none",border:"none",color:C.b,cursor:"pointer",fontSize:11}}>編輯</button>
        <button onClick={()=>confirm("刪除？")&&deleteGame(g.id)} style={{background:"none",border:"none",color:C.m,cursor:"pointer",fontSize:11}}>刪除</button>
      </div>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"6px 0"}}>
      <span style={{fontSize:14,fontWeight:w===g.away?700:400,color:w===g.away?C.g:C.t}}>{g.away}</span>
      <span style={{...mono,fontSize:18,fontWeight:700}}>{g.awayScore} <span style={{color:C.m}}>:</span> {g.homeScore}</span>
      <span style={{fontSize:14,fontWeight:w===g.home?700:400,color:w===g.home?C.g:C.t}}>{g.home}</span>
    </div>
    <div style={{display:"flex",gap:8,fontSize:11,color:C.d,flexWrap:"wrap"}}>
      <span>總分 {total}</span><span>·</span><span>分差 {margin}</span>
      <span>·</span><span>不讓分 <span style={{color:C.acc}}>{w}</span></span>
      <span>·</span><span>{total>8.5?"大":"小"} 8.5</span>
      <span>·</span><span>讓1.5 <span style={{color:C.acc}}>{margin>1.5?w:(w===g.home?g.away:g.home)+"(受讓)"}</span></span>
    </div>

    {/* Decisions summary (always show if available) */}
    {g.winner&&<div style={{fontSize:11,color:C.d,marginTop:4}}>
      <span style={{color:C.g}}>W</span> {g.winner} · <span style={{color:C.r}}>L</span> {g.loser}{g.save&&<span> · <span style={{color:C.b}}>SV</span> {g.save}</span>}
    </div>}

    {/* Expandable detail section */}
    {detail&&hasMLB&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.bd}`}}>

      {/* Linescore table */}
      {g.innings&&<div style={{overflowX:"auto",marginBottom:10}}>
        <div style={{display:"grid",gridTemplateColumns:`60px repeat(${g.innings.length},1fr) repeat(3,36px)`,gap:0,minWidth:300}}>
          <div style={hdr}></div>
          {g.innings.map(inn=><div key={inn.num} style={hdr}>{inn.num}</div>)}
          <div style={{...hdr,color:C.t,fontWeight:700}}>R</div>
          <div style={{...hdr,color:C.t,fontWeight:700}}>H</div>
          <div style={{...hdr,color:C.t,fontWeight:700}}>E</div>

          <div style={{fontSize:11,padding:"4px 0",color:w===g.away?C.g:C.t,fontWeight:w===g.away?700:400}}>{g.away}</div>
          {g.innings.map(inn=><div key={inn.num} style={cell}>{inn.away}</div>)}
          <div style={{...cell,fontWeight:700,color:C.t}}>{g.awayScore}</div>
          <div style={cell}>{g.awayHits}</div>
          <div style={cell}>{g.awayErrors}</div>

          <div style={{fontSize:11,padding:"4px 0",color:w===g.home?C.g:C.t,fontWeight:w===g.home?700:400}}>{g.home}</div>
          {g.innings.map(inn=><div key={inn.num} style={cell}>{inn.home}</div>)}
          <div style={{...cell,fontWeight:700,color:C.t}}>{g.homeScore}</div>
          <div style={cell}>{g.homeHits}</div>
          <div style={cell}>{g.homeErrors}</div>
        </div>
      </div>}

      {/* Starting pitchers */}
      {(g.spAway||g.spHome)&&<div style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:600,marginBottom:6,color:C.t}}>先發投手</div>
        {[["away",g.spAway,g.away],["home",g.spHome,g.home]].map(([side,sp,team])=>sp&&<div key={side} style={{fontSize:11,padding:"4px 0",borderBottom:`1px solid ${C.bd}`}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span><span style={{color:C.acc}}>{team}</span> {sp.name}</span>
            <span style={{color:C.d,...mono}}>{sp.ip} IP</span>
          </div>
          <div style={{color:C.d,...mono,marginTop:2}}>
            {sp.pitches}球({sp.strikes}K) · {sp.h}H · {sp.r}R({sp.er}ER) · {sp.bb}BB · {sp.so}SO · {sp.hr}HR
          </div>
        </div>)}
      </div>}

// ─── Team Stats Calculator ───
function calcTeamStats(games,team){
  const gs=games.filter(g=>g.away===team||g.home===team).sort((a,b)=>b.date.localeCompare(a.date));
  if(!gs.length)return null;
  const isHome=g=>g.home===team;
  const won=g=>(isHome(g)&&g.homeScore>g.awayScore)||(!isHome(g)&&g.awayScore>g.homeScore);
  const scored=g=>isHome(g)?g.homeScore:g.awayScore;
  const allowed=g=>isHome(g)?g.awayScore:g.homeScore;
  const margin=g=>scored(g)-allowed(g);
  const total=g=>g.homeScore+g.awayScore;
  const absMargin=g=>Math.abs(g.homeScore-g.awayScore);
  let streak=0,streakType=won(gs[0])?"W":"L";
  for(const g of gs){if((won(g)?"W":"L")===streakType)streak++;else break}
  const rec=(n)=>{const s=gs.slice(0,n);const w=s.filter(won).length;return{w,l:s.length-w,n:s.length}};
  const homeGs=gs.filter(isHome),awayGs=gs.filter(g=>!isHome(g));
  const homeW=homeGs.filter(won).length,awayW=awayGs.filter(won).length;
  const avgScored=(gs.reduce((a,g)=>a+scored(g),0)/gs.length).toFixed(1);
  const avgAllowed=(gs.reduce((a,g)=>a+allowed(g),0)/gs.length).toFixed(1);
  const avgTotal=(gs.reduce((a,g)=>a+total(g),0)/gs.length).toFixed(1);
  const avgMargin=(gs.filter(won).reduce((a,g)=>a+margin(g),0)/(gs.filter(won).length||1)).toFixed(1);
  const coverRate15=gs.length?(gs.filter(g=>won(g)&&absMargin(g)>1.5).length/gs.length*100).toFixed(0):"—";
  const ouRate=(line)=>gs.length?(gs.filter(g=>total(g)>line).length/gs.length*100).toFixed(0):"—";
  const margins={close:0,mid:0,blow:0};
  gs.forEach(g=>{const m=absMargin(g);if(m<=2)margins.close++;else if(m<=4)margins.mid++;else margins.blow++});
  const recent=gs.slice(0,10).map(g=>({date:g.date,opp:isHome(g)?g.away:g.home,result:won(g)?"W":"L",score:`${scored(g)}-${allowed(g)}`,total:total(g),margin:margin(g),home:isHome(g)}));
  return{streak,streakType,rec5:rec(5),rec10:rec(10),rec20:rec(20),homeW,homeTotal:homeGs.length,awayW,awayTotal:awayGs.length,avgScored,avgAllowed,avgTotal,avgMargin,coverRate15,ou75:ouRate(7.5),ou85:ouRate(8.5),ou95:ouRate(9.5),margins,recent,totalGames:gs.length};
}

function StatsView({bets,games}){
  const[section,setSection]=useState("standings");
  const[teamL,setTeamL]=useState("");
  const[teamR,setTeamR]=useState("");
  const[teamMode,setTeamMode]=useState("single");

  // --- Bet stats ---
  const settled=bets.filter(b=>calcPayout(b).status!=="pending");
  const wins=settled.filter(b=>calcPayout(b).status==="win").length;
  const tW=settled.reduce((a,b)=>a+b.amount,0);
  const tP=settled.reduce((a,b)=>a+calcPayout(b).profit,0);
  const wr=settled.length?((wins/settled.length)*100).toFixed(1):"—";
  const roi=tW?((tP/tW)*100).toFixed(1):"—";
  const byMkt={};
  settled.filter(b=>b.type==="single").forEach(b=>{const k=b.legs[0].market;if(!byMkt[k])byMkt[k]={t:0,w:0,p:0};byMkt[k].t++;if(calcPayout(b).status==="win")byMkt[k].w++;byMkt[k].p+=calcPayout(b).profit});

  const ML={normal:"不讓分",handi:"讓分",total:"大小分"};

  const exportMD=async()=>{
    let md="# MLB 賽季報告\n\n";
    md+=`匯出時間：${new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei"})}\n\n`;

    // 1. Standings from API
    md+="## 各區戰績\n\n";
    try{
      const res=await fetch(`${MLB_API}/standings?leagueId=103,104&season=${new Date().getFullYear()}&standingsTypes=regularSeason`);
      const json=await res.json();
      const sorted=DIV_ORDER.map(id=>(json.records||[]).find(r=>r.division?.id===id)).filter(Boolean);
      sorted.forEach(div=>{
        const divName=DIV_NAMES[div.division?.id]||"";
        md+=`### ${divName}\n\n`;
        md+=`| 球隊 | W | L | 勝率 | GB | 連勝 | L10 | 主場 | 客場 |\n`;
        md+=`|------|---|---|------|-----|------|-----|------|------|\n`;
        div.teamRecords.forEach(t=>{
          const zh=teamZh(t.team.id);
          const sp=(type)=>(t.records?.splitRecords||[]).find(r=>r.type===type);
          const l10=sp("lastTen");const hm=sp("home");const aw=sp("away");
          md+=`| ${zh} | ${t.wins} | ${t.losses} | ${t.winningPercentage} | ${t.divisionGamesBack==="-"?"—":t.divisionGamesBack} | ${t.streak?.streakCode||""} | ${l10?l10.wins+"-"+l10.losses:"—"} | ${hm?hm.wins+"-"+hm.losses:"—"} | ${aw?aw.wins+"-"+aw.losses:"—"} |\n`;
        });
        md+="\n";
      });
    }catch(e){md+="（戰績載入失敗）\n\n"}

    // 2. All bets detail
    md+="## 投注紀錄\n\n";
    bets.forEach(bet=>{
      const r=calcPayout(bet);
      const st=r.status==="win"?"WIN":r.status==="lose"?"LOSE":"PENDING";
      md+=`### ${bet.legs[0]?.date} ${bet.type==="parlay"?`串${bet.legs.length}關`:"單場"} [${st}]\n\n`;
      md+=`- 金額：NT$${bet.amount.toLocaleString()} × ${bet.totalOdds.toFixed(2)}\n`;
      if(r.status!=="pending")md+=`- 盈虧：${r.profit>=0?"+":""}NT$${r.profit.toLocaleString()}\n`;
      if(bet.note)md+=`- 備註：${bet.note}\n`;
      md+="\n";
      bet.legs.forEach((l,i)=>{
        const res=l.result==="win"?"WIN":l.result==="lose"?"LOSE":"PENDING";
        md+=`**第${i+1}關** ${l.away} @ ${l.home} [${res}]\n`;
        md+=`- 玩法：${ML[l.market]||l.market}${l.line?` ${l.line}`:""} → ${l.selection==="home"?l.home:l.selection==="away"?l.away:l.selection==="over"?"大":"小"}\n`;
        md+=`- 賠率：${Number(l.odds).toFixed(2)}\n`;
        if(l.homeScore!==""&&l.awayScore!=="")md+=`- 比數：${l.awayScore}:${l.homeScore}\n`;
        md+="\n";
      });
      md+="---\n\n";
    });

    // 3. Game results
    md+="## 賽果紀錄\n\n";
    games.forEach(g=>{
      const w=g.homeScore>g.awayScore?g.home:g.away;
      const total=g.homeScore+g.awayScore;
      md+=`### ${g.date} ${g.away}${g.awayEn?" ("+g.awayEn+")":""} @ ${g.home}${g.homeEn?" ("+g.homeEn+")":""}\n\n`;
      md+=`**${g.awayScore} : ${g.homeScore}** | 總分 ${total} | 分差 ${Math.abs(g.homeScore-g.awayScore)} | 勝：${w}\n\n`;

      if(g.winner)md+=`W: ${g.winner} / L: ${g.loser}${g.save?" / SV: "+g.save:""}\n\n`;

      if(g.innings){
        md+=`| | ${g.innings.map(inn=>inn.num).join(" | ")} | R | H | E |\n`;
        md+=`|---|${g.innings.map(()=>"---").join("|")}|---|---|---|\n`;
        md+=`| ${g.away} | ${g.innings.map(inn=>inn.away).join(" | ")} | ${g.awayScore} | ${g.awayHits||0} | ${g.awayErrors||0} |\n`;
        md+=`| ${g.home} | ${g.innings.map(inn=>inn.home).join(" | ")} | ${g.homeScore} | ${g.homeHits||0} | ${g.homeErrors||0} |\n\n`;
      }

      if(g.spAway||g.spHome){
        md+="**先發投手**\n\n| 隊伍 | 投手 | IP | H | R | ER | BB | SO | HR | 球數 |\n|------|------|-----|---|---|----|----|----|----|------|\n";
        [["away",g.spAway,g.away],["home",g.spHome,g.home]].forEach(([,sp,team])=>{
          if(sp)md+=`| ${team} | ${sp.name} | ${sp.ip} | ${sp.h} | ${sp.r} | ${sp.er} | ${sp.bb} | ${sp.so} | ${sp.hr} | ${sp.pitches}(${sp.strikes}K) |\n`;
        });
        md+="\n";
      }

      if(g.homeRuns&&g.homeRuns.length){
        md+="**全壘打**\n\n";
        g.homeRuns.forEach(hr=>{md+=`- ${hr}\n`});
        md+="\n";
      }

      md+="---\n\n";
    });

    // Download
    const blob=new Blob([md],{type:"text/markdown;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`mlb-report-${todayPT()}.md`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  return<div>
    <div style={{fontSize:16,fontWeight:700,marginBottom:14}}>統計分析</div>
    <div style={{display:"flex",gap:6,marginBottom:16}}><Pill sel={section==="standings"} onClick={()=>setSection("standings")}>各區戰績</Pill><Pill sel={section==="team"} onClick={()=>setSection("team")}>球隊數據</Pill><Pill sel={section==="bet"} onClick={()=>setSection("bet")}>投注績效</Pill></div>

    {section==="standings"&&<Standings/>}

    {section==="bet"&&<div>
      {!settled.length?<div style={{textAlign:"center",padding:"40px",color:C.d}}>尚無已結算投注</div>:<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          <Stat label="已結算" value={settled.length} unit="注"/>
          <Stat label="勝率" value={wr} unit="%" color={Number(wr)>=50?C.g:C.r}/>
          <Stat label="總投注" value={`$${tW.toLocaleString()}`}/>
          <Stat label="累積盈虧" value={`${tP>=0?"+":""}$${tP.toLocaleString()}`} color={tP>=0?C.g:C.r}/>
          <Stat label="勝/負" value={`${wins}/${settled.length-wins}`}/>
          <Stat label="ROI" value={roi} unit="%" color={Number(roi)>=0?C.g:C.r}/>
        </div>
        {Object.keys(byMkt).length>0&&<div style={{background:C.card,borderRadius:10,padding:"14px 16px",border:`1px solid ${C.bd}`,marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>各玩法統計</div>
          {Object.entries(byMkt).map(([k,m])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.bd}`}}>
            <span style={{fontSize:13}}>{ML[k]}</span>
            <div style={{display:"flex",gap:16,fontSize:12}}><span style={{color:C.d}}>{m.w}/{m.t} ({(m.w/m.t*100).toFixed(0)}%)</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:m.p>=0?C.g:C.r}}>{m.p>=0?"+":""}{m.p.toLocaleString()}</span></div>
          </div>)}
        </div>}
        <button onClick={exportMD} style={{width:"100%",padding:12,borderRadius:8,border:`1px solid ${C.bd}`,background:C.card,color:C.t,fontSize:14,fontWeight:600,cursor:"pointer",outline:"none",marginTop:12}}>匯出分析報告 (.md)</button>
      </>}
    </div>}

    {section==="team"&&<div>
      <div style={{display:"flex",gap:6,marginBottom:12}}><Pill sel={teamMode==="single"} onClick={()=>setTeamMode("single")}>單隊</Pill><Pill sel={teamMode==="compare"} onClick={()=>setTeamMode("compare")}>比較</Pill></div>
      {teamMode==="single"?<TeamPanel team={teamL} setTeam={setTeamL} games={games}/>:
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <TeamPanel team={teamL} setTeam={setTeamL} games={games}/>
        <TeamPanel team={teamR} setTeam={setTeamR} games={games}/>
      </div>}
    </div>}
  </div>;
}

function useFirestore(uid,colName,localKey,orderField="createdAt"){
  const[data,setData]=useState(()=>load(localKey,[]));
  const fromSnap=useRef(false);

  // Listen to Firestore realtime updates
  useEffect(()=>{
    if(!uid)return;
    const unsub=userDoc(uid,colName).orderBy(orderField,"desc").onSnapshot(snap=>{
      const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
      fromSnap.current=true;
      setData(docs);
      save(localKey,docs);
    },err=>console.error("Firestore listen error:",err));
    return()=>unsub();
  },[uid,colName]);

  const add=useCallback(async(item)=>{
    const{id,...rest}=item;
    if(!rest.createdAt)rest.createdAt=new Date().toISOString();
    await userDoc(uid,colName).doc(id).set(rest);
  },[uid,colName]);

  const update=useCallback(async(id,item)=>{
    const{id:_,...rest}=item;
    await userDoc(uid,colName).doc(id).update(rest);
  },[uid,colName]);

  const remove=useCallback(async(id)=>{
    await userDoc(uid,colName).doc(id).delete();
  },[uid,colName]);

  return{data,setData,add,update,remove,fromSnap};
}

// ═══════════════════════════════════════
// ANALYSIS VIEW (v3 — multi bet types)
// ═══════════════════════════════════════
const BET_TYPES=[
  {key:"ml",label:"不讓分",short:"不讓分"},
  {key:"spread_1.5",label:"讓分 1.5",short:"讓1.5"},
  {key:"spread_2.5",label:"讓分 2.5",short:"讓2.5"},
  {key:"total_7.5",label:"大小分 7.5",short:"7.5"},
  {key:"total_8.5",label:"大小分 8.5",short:"8.5"},
  {key:"total_9.5",label:"大小分 9.5",short:"9.5"}
];

function getMetricMeta(key){
  if(key.startsWith("composite:"))return{name:key.replace("composite:",""),cat:"composite"};
  if(key.startsWith("comp:"))return{name:key.replace("comp:",""),cat:"composite"};
  if(key.startsWith("sp_"))return{name:key.toUpperCase(),cat:"sp"};
  if(key==="bp_fatigue")return{name:"🔋 牛棚疲勞",cat:"bullpen"};
  if(key==="home_adv")return{name:"🏠 主場優勢",cat:"situational"};
  return{name:key,cat:"team"};
}

function pctColorV3(pct){
  if(pct>=56)return C.g;
  if(pct>=54)return"#34d399";
  if(pct>=52)return C.d;
  if(pct>=50)return"#f59e0b";
  return C.r;
}

function fmtNum(v){
  if(typeof v!=="number")return v;
  if(Math.abs(v)<10)return v.toFixed(3);
  return v.toFixed(2);
}

// Convert predicted value to display label
function formatPrediction(predicted,awayZh,homeZh){
  if(predicted==="home")return homeZh;
  if(predicted==="away")return awayZh;
  if(predicted==="over")return"大";
  if(predicted==="under")return"小";
  return"—";
}

function confidenceStars(conf){
  if(conf==="high")return"⭐⭐⭐";
  if(conf==="medium")return"⭐⭐";
  if(conf==="low")return"⭐";
  return"";
}
function confidenceLabel(conf){
  if(conf==="high")return"高";
  if(conf==="medium")return"中";
  if(conf==="low")return"低";
  return"—";
}

// ─── Stat Comparison Row ───
function StatRow({label,away,home,edge,awayZh,homeZh,warn}){
  const mono={fontFamily:"'JetBrains Mono',monospace"};
  const arrow=edge==="away"?"◀":edge==="home"?"▶":"=";
  const awayCol=edge==="away"?C.g:edge==="home"?C.r:C.d;
  const homeCol=edge==="home"?C.g:edge==="away"?C.r:C.d;
  return<React.Fragment>
    <div style={{color:C.d,fontSize:12}}>{label}{warn&&<span style={{color:"#f59e0b",marginLeft:4}}>⚠️</span>}</div>
    <div style={{...mono,color:awayCol,textAlign:"right",fontSize:12}}>{fmtNum(away)}</div>
    <div style={{color:C.m,textAlign:"center",width:14,fontSize:12}}>{arrow}</div>
    <div style={{...mono,color:homeCol,textAlign:"left",fontSize:12}}>{fmtNum(home)}</div>
    <div style={{fontSize:11,color:edge==="away"?C.g:edge==="home"?C.acc:C.m,paddingLeft:4}}>
      {edge==="away"?`✓ ${awayZh}優`:edge==="home"?`✓ ${homeZh}優`:"持平"}
    </div>
  </React.Fragment>;
}

// ─── Indicator Ranking Table (per bet type) ───
function IndicatorRanking({ranking,btKey}){
  const mono={fontFamily:"'JetBrains Mono',monospace"};
  const[catFilter,setCatFilter]=useState("all");
  const isSpread=btKey==="spread_1.5"||btKey==="spread_2.5";
  const isTotal=btKey&&btKey.startsWith("total_");
  const is95=btKey==="total_9.5";

  if(!ranking||!ranking.length)return<div style={{textAlign:"center",padding:30,color:C.d,fontSize:12}}>無指標資料</div>;

  const filtered=ranking.filter(r=>{
    const cat=r.category||getMetricMeta(r.name).cat;
    if(catFilter==="all")return true;
    return cat===catFilter;
  });

  return<div>
    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
      <Pill sel={catFilter==="all"} onClick={()=>setCatFilter("all")}>全部</Pill>
      <Pill sel={catFilter==="composite"} onClick={()=>setCatFilter("composite")}>複合</Pill>
      <Pill sel={catFilter==="starter"} onClick={()=>setCatFilter("starter")}>先發</Pill>
      <Pill sel={catFilter==="team"} onClick={()=>setCatFilter("team")}>球隊</Pill>
    </div>

    {filtered.map((r,i)=>{
      const meta=getMetricMeta(r.name);
      const cat=r.category||meta.cat;
      const col=pctColorV3(r.pct);
      const isBP=r.name==="bp_fatigue";
      const isHomeAdv=r.name==="home_adv";
      const reverseHome=isSpread&&isHomeAdv;
      const bpInvalid=isBP&&!is95;
      const isComposite=cat==="composite";
      const isStarter=cat==="starter";
      const hasHomeBonus=r.name.includes("+home");
      return<div key={r.name+"_"+i} style={{background:C.card,borderRadius:10,padding:"12px 14px",border:`1px solid ${(reverseHome||bpInvalid)?"#f59e0b":C.bd}`,marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:4}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:11,color:C.m,...mono,minWidth:18}}>#{i+1}</span>
            <span style={{fontSize:13,fontWeight:600,color:C.t,wordBreak:"break-all"}}>{meta.name}</span>
            {isStarter&&<span style={{fontSize:10,color:C.b,background:C.bD,padding:"2px 6px",borderRadius:4,fontWeight:600}}>先發投手</span>}
            {isComposite&&<span style={{fontSize:10,color:C.acc,background:C.accD,padding:"2px 6px",borderRadius:4,fontWeight:600}}>複合</span>}
            {hasHomeBonus&&<span style={{fontSize:10,color:C.g,background:C.gD,padding:"2px 6px",borderRadius:4,fontWeight:600}}>主場修正</span>}
            {cat==="bullpen"&&<span style={{fontSize:10,color:"#f59e0b",background:"rgba(245,158,11,0.15)",padding:"2px 6px",borderRadius:4,fontWeight:600}}>牛棚 ⚠️</span>}
            {cat==="situational"&&<span style={{fontSize:10,color:C.d,background:"rgba(107,114,128,0.15)",padding:"2px 6px",borderRadius:4,fontWeight:600}}>情境</span>}
            {r.significant&&<span style={{fontSize:10,color:C.g,background:C.gD,padding:"2px 6px",borderRadius:4,fontWeight:600}}>顯著</span>}
          </div>
          <span style={{fontSize:16,fontWeight:700,...mono,color:col}}>{r.pct?.toFixed(1)}%</span>
        </div>
        <div style={{height:6,background:C.bg,borderRadius:3,marginBottom:6}}>
          <div style={{height:"100%",width:`${Math.min(100,r.pct||0)}%`,background:col,borderRadius:3,transition:"width .3s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.d}}>
          <span>{r.correct}/{r.total} 場{r.direction?` · ${r.direction}`:""}</span>
          {r.z_score!=null&&<span style={{...mono}}>z={r.z_score.toFixed(2)}</span>}
        </div>
        {reverseHome&&<div style={{fontSize:11,color:"#f59e0b",marginTop:6,fontStyle:"italic"}}>⚠️ 讓分盤口下主場優勢為反向指標，已自動排除 +home 複合變體</div>}
        {bpInvalid&&<div style={{fontSize:11,color:"#f59e0b",marginTop:6,fontStyle:"italic"}}>⚠️ bp_fatigue 僅在大小分 9.5 有效，其他盤口為 50% 無效</div>}
        {isBP&&is95&&<div style={{fontSize:11,color:C.g,marginTop:6,fontStyle:"italic"}}>★ 大小分 9.5 是唯一 bp_fatigue 有效的盤口</div>}
      </div>;
    })}
  </div>;
}

// ─── Profitable Filters Table (per bet type) ───

  const list=showAll?filters:filters.slice(0,limit);
  return<div>
    {list.map((f,i)=>{
      const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`;
      const isTop=i<3;
      return<div key={i} style={{background:C.card,borderRadius:10,padding:"12px 14px",border:`1px solid ${isTop?C.acc:C.bd}`,marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:14,fontWeight:700,color:isTop?C.acc:C.t}}>{medal}</span>
            <span style={{fontSize:13,fontWeight:600,color:C.t,wordBreak:"break-all"}}>{f.stat}</span>
            <span style={{fontSize:10,color:C.acc,background:C.accD,padding:"2px 6px",borderRadius:4,fontWeight:600}}>Top {f.top_pct}%</span>
          </div>
          <span style={{fontSize:11,color:C.d}}>樣本 {f.sample}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div style={{background:C.bg,borderRadius:6,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:10,color:C.d,marginBottom:2}}>單腳命中率</div>
            <div style={{fontSize:15,fontWeight:700,...mono,color:f.single_pct>=60?C.g:C.t}}>{f.single_pct?.toFixed(1)}%</div>
          </div>
          <div style={{background:C.bg,borderRadius:6,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:10,color:C.d,marginBottom:2}}>串 2 關</div>
            <div style={{fontSize:15,fontWeight:700,...mono,color:C.t}}>{f.parlay_pct?.toFixed(1)}%</div>
          </div>
          <div style={{background:C.bg,borderRadius:6,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:10,color:C.d,marginBottom:2}}>損益平衡</div>
            <div style={{fontSize:15,fontWeight:700,...mono,color:C.acc}}>{f.breakeven_combined_odds?.toFixed(2)}</div>
          </div>
        </div>
      </div>;
    })}
    {filters.length>limit&&<button onClick={()=>setShowAll(!showAll)} style={{width:"100%",padding:10,borderRadius:8,border:`1px solid ${C.bd}`,background:"transparent",color:C.acc,fontSize:12,cursor:"pointer",outline:"none",marginTop:4}}>
      {showAll?"收合":`展開全部 (${filters.length})`}
    </button>}
  </div>;
}

// ─── Bet Type Panel inside a matchup card ───
function BetTypePanel({btKey,bt,awayZh,homeZh}){
  const mono={fontFamily:"'JetBrains Mono',monospace"};
  if(!bt)return<div style={{padding:20,textAlign:"center",color:C.d,fontSize:12}}>該盤口無資料</div>;

  const isTop10=bt.is_top_10_pct;
  const conf=bt.confidence||"";
  const stars=confidenceStars(conf);
  const predictedZh=formatPrediction(bt.predicted,awayZh,homeZh);
  const votes=bt.votes||{};
  const matchedFilters=bt.matched_filters||[];
  const compScores=bt.composite_scores||{};

  // Top 3 composite scores by abs value
  const topScores=Object.entries(compScores)
    .sort(([,a],[,b])=>Math.abs(b.value||0)-Math.abs(a.value||0))
    .slice(0,5);

  // Determine vote color (which side is voting)
  const voteEntries=Object.entries(votes);

  return<div style={{padding:"10px 0"}}>
    {/* Top 10% banner */}
    {isTop10&&<div style={{background:"rgba(16,185,129,0.12)",border:`1px solid ${C.g}`,borderRadius:6,padding:"6px 10px",marginBottom:10,fontSize:12,fontWeight:700,color:C.g,display:"flex",alignItems:"center",gap:6}}>
      ⭐ Top 10% 高信心場次
    </div>}

    {/* Prediction summary */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
      <div style={{background:C.bg,borderRadius:6,padding:"8px 10px",textAlign:"center",border:`1px solid ${C.bd}`}}>
        <div style={{fontSize:10,color:C.d,marginBottom:2}}>預測</div>
        <div style={{fontSize:15,fontWeight:700,color:isTop10?C.g:C.t}}>{predictedZh}</div>
      </div>
      <div style={{background:C.bg,borderRadius:6,padding:"8px 10px",textAlign:"center",border:`1px solid ${C.bd}`}}>
        <div style={{fontSize:10,color:C.d,marginBottom:2}}>信心度</div>
        <div style={{fontSize:14,fontWeight:700}}>{stars} <span style={{fontSize:11,color:C.d}}>({confidenceLabel(conf)})</span></div>
      </div>
    </div>

    {/* Vote breakdown */}
    {voteEntries.length>0&&<div style={{background:C.bg,borderRadius:6,padding:"8px 10px",border:`1px solid ${C.bd}`,marginBottom:10}}>
      <div style={{fontSize:10,color:C.d,marginBottom:4}}>複合分數投票</div>
      <div style={{display:"flex",gap:10,fontSize:12,...mono,justifyContent:"center"}}>
        {voteEntries.map(([k,v])=>{
          const lbl=k==="home"?homeZh:k==="away"?awayZh:k==="over"?"大":k==="under"?"小":k;
          const isPredicted=k===bt.predicted;
          return<span key={k} style={{color:isPredicted?C.g:C.d,fontWeight:isPredicted?700:400}}>{lbl} {v}</span>;
        })}
      </div>
    </div>}

    {/* Min combined odds needed */}
    {bt.min_combined_odds_needed!=null&&<div style={{background:"rgba(245,158,11,0.08)",borderRadius:6,padding:"8px 10px",border:`1px solid ${C.acc}`,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:11,color:C.d}}>建議最低合計賠率</span>
      <span style={{fontSize:14,fontWeight:700,...mono,color:C.acc}}>{bt.min_combined_odds_needed.toFixed(2)}</span>
    </div>}

    {/* Matched filters */}
    {matchedFilters.length>0&&<div style={{background:"rgba(16,185,129,0.08)",borderRadius:6,padding:"8px 10px",border:`1px solid ${C.g}`,marginBottom:10}}>
      <div style={{fontSize:11,fontWeight:700,color:C.g,marginBottom:6}}>✅ 符合篩選 ({matchedFilters.length})</div>
      {matchedFilters.map((f,i)=><div key={i} style={{fontSize:11,color:C.t,padding:"3px 0",borderTop:i?`1px solid ${C.bd}`:"none"}}>
        <div style={{fontWeight:600,wordBreak:"break-all"}}>✓ {f.stat} <span style={{color:C.acc}}>Top {f.top_pct}%</span></div>
        {(f.baseline_hit_rate!=null||f.min_odds_needed!=null)&&<div style={{fontSize:10,color:C.d,marginTop:2,...mono}}>
          {f.baseline_hit_rate!=null&&<>歷史命中 {f.baseline_hit_rate.toFixed(1)}%</>}
          {f.min_odds_needed!=null&&<> · 最低賠率 {f.min_odds_needed.toFixed(2)}</>}
        </div>}
      </div>)}
    </div>}

    {/* Top composite scores */}
    {topScores.length>0&&<div style={{background:C.bg,borderRadius:6,padding:"8px 10px",border:`1px solid ${C.bd}`}}>
      <div style={{fontSize:11,fontWeight:700,color:C.acc,marginBottom:6}}>🧮 主要複合分數</div>
      {topScores.map(([k,c])=>{
        const bucket=c.bucket;
        const bucketStars=bucket==="Top 10%"?"⭐⭐⭐":bucket==="Top 20%"?"⭐⭐":bucket==="Top 30%"?"⭐":"";
        const predicts=c.predicts;
        const predictsZh=formatPrediction(predicts,awayZh,homeZh);
        const valColor=c.value>=0?C.acc:C.b;
        return<div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderTop:`1px solid ${C.bd}`,fontSize:11}}>
          <span style={{color:C.d,wordBreak:"break-all",flex:1,minWidth:0}}>{k}</span>
          <span style={{...mono,color:valColor,fontWeight:700,marginLeft:6,minWidth:48,textAlign:"right"}}>{c.value>=0?"+":""}{c.value?.toFixed(2)}</span>
          <span style={{color:C.m,margin:"0 6px"}}>→</span>
          <span style={{color:predicts==="away"||predicts==="over"?C.g:C.acc,fontWeight:700,minWidth:28,textAlign:"left"}}>{predictsZh}</span>
          {bucketStars&&<span style={{marginLeft:4,fontSize:10}}>{bucketStars}</span>}
        </div>;
      })}
    </div>}
  </div>;
}

// ─── Matchup Card (v3) ───
function MatchupCardV3({m}){
  const awayZh=m.away_zh||m.away;
  const homeZh=m.home_zh||m.home;
  const teamComps=m.team_comparisons||{};
  const spComps=m.sp_comparisons||{};
  const betTypes=m.bet_types||{};
  const isTop10=m.any_top_10_pct;

  // Default to first bet type that exists; prefer ml
  const availableBts=BET_TYPES.filter(b=>betTypes[b.key]);
  const defaultBt=availableBts.find(b=>b.key==="ml")?.key||availableBts[0]?.key;
  const[selBt,setSelBt]=useState(defaultBt);

  const cardStyle={
    background:isTop10?"rgba(16,185,129,0.06)":C.card,
    borderRadius:10,
    padding:0,
    border:`${isTop10?2:1}px solid ${isTop10?C.g:C.bd}`,
    marginBottom:10,
    overflow:"hidden"
  };

  return<div style={cardStyle}>
    {isTop10&&<div style={{background:C.g,color:"#000",padding:"6px 14px",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
      ⭐ 符合 Top 10% 高信心篩選
    </div>}

    <div style={{padding:14}}>
      {/* Header */}
      <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>
        <span style={{color:m.away_edges>m.home_edges?C.g:C.t}}>{awayZh}</span>
        <span style={{fontSize:11,color:C.d,marginLeft:4}}>({m.away_record||"—"})</span>
        <span style={{color:C.m,margin:"0 6px"}}>@</span>
        <span style={{color:m.home_edges>m.away_edges?C.acc:C.t}}>{homeZh}</span>
        <span style={{fontSize:11,color:C.d,marginLeft:4}}>({m.home_record||"—"})</span>
      </div>
      {(m.away_sp||m.home_sp)&&<div style={{fontSize:11,color:C.d,marginBottom:12}}>
        {m.away_sp||"—"} <span style={{color:C.m}}>vs</span> {m.home_sp||"—"}
      </div>}

      {/* SP Section */}
      {Object.keys(spComps).length>0&&<div style={{background:C.bg,borderRadius:8,padding:10,border:`1px solid ${C.bd}`,marginBottom:8}}>
        <div style={{fontSize:12,fontWeight:700,color:C.b,marginBottom:8}}>⚾ 今日先發投手對決</div>
        <div style={{display:"grid",gridTemplateColumns:"auto 1fr 14px 1fr auto",gap:"4px 8px",alignItems:"center"}}>
          {Object.entries(spComps).map(([k,c])=>{
            const meta=getMetricMeta(k);
            return<StatRow key={k} label={meta.name} away={c.away} home={c.home} edge={c.edge} awayZh={awayZh} homeZh={homeZh}/>;
          })}
        </div>
      </div>}

      {/* Team Section */}
      {Object.keys(teamComps).length>0&&<div style={{background:C.bg,borderRadius:8,padding:10,border:`1px solid ${C.bd}`,marginBottom:8}}>
        <div style={{fontSize:12,fontWeight:700,color:C.t,marginBottom:8}}>📊 球隊整季數據</div>
        <div style={{display:"grid",gridTemplateColumns:"auto 1fr 14px 1fr auto",gap:"4px 8px",alignItems:"center"}}>
          {Object.entries(teamComps).map(([k,c])=>{
            const meta=getMetricMeta(k);
            const warn=k==="bp_fatigue";
            return<StatRow key={k} label={meta.name} away={c.away} home={c.home} edge={c.edge} awayZh={awayZh} homeZh={homeZh} warn={warn}/>;
          })}
        </div>
      </div>}

      {/* Bet Type Tabs */}
      {availableBts.length>0&&<div style={{background:C.bg,borderRadius:8,padding:10,border:`1px solid ${C.bd}`}}>
        <div style={{fontSize:12,fontWeight:700,color:C.acc,marginBottom:8}}>🎯 六盤口預測</div>
        <div style={{display:"flex",gap:4,marginBottom:6,flexWrap:"wrap"}}>
          {availableBts.map(b=>{
            const bt=betTypes[b.key];
            const top=bt?.is_top_10_pct;
            const sel=selBt===b.key;
            return<button key={b.key} onClick={()=>setSelBt(b.key)} style={{padding:"5px 10px",borderRadius:14,fontSize:11,cursor:"pointer",fontWeight:600,border:sel?`2px solid ${top?C.g:C.acc}`:`1px solid ${C.bd}`,background:sel?(top?"rgba(16,185,129,0.12)":C.accD):"transparent",color:sel?(top?C.g:C.acc):C.d,outline:"none"}}>
              {b.short}{top?" ⭐":""}
            </button>;
          })}
        </div>
        <BetTypePanel btKey={selBt} bt={betTypes[selBt]} awayZh={awayZh} homeZh={homeZh}/>
      </div>}

// ─── Recommendation Scoring ───
function scorePick(matchup,btKey){
  const bt=matchup.bet_types?.[btKey];
  if(!bt||!bt.predicted||bt.predicted==="even")return null;

  let score=0;
  // Top 10% is the biggest signal
  if(bt.is_top_10_pct)score+=100;

  // Each matched filter adds points based on historical hit rate
  const filters=bt.matched_filters||[];
  let bestHitRate=0,bestMinOdds=null;
  filters.forEach(f=>{
    const hr=f.baseline_hit_rate||50;
    score+=Math.max(0,(hr-50)*3);
    if(hr>bestHitRate){
      bestHitRate=hr;
      bestMinOdds=f.min_odds_needed;
    }
  });
  score+=filters.length*5; // 5 bonus per matched filter count

  // Confidence bonus
  const confBonus={high:30,medium:15,low:5};
  score+=confBonus[bt.confidence]||0;

  // Vote unanimity bonus
  const votes=bt.votes||{};
  const voteVals=Object.values(votes);
  if(voteVals.length>=2){
    const total=voteVals.reduce((a,b)=>a+b,0);
    const max=Math.max(...voteVals);
    if(total>0)score+=(max/total)*25;
  }

  return{
    matchup,btKey,bt,score,
    bestHitRate,
    bestMinOdds:bestMinOdds||bt.min_combined_odds_needed,
    filterCount:filters.length
  };
}

function generateRecommendations(matchups,numBets,legsPerBet){
  // For each matchup, find its best-scoring bet type
  const bestPerMatchup=[];
  matchups.forEach(m=>{
    const btKeys=Object.keys(m.bet_types||{});
    let best=null;
    btKeys.forEach(k=>{
      const p=scorePick(m,k);
      if(p&&(!best||p.score>best.score))best=p;
    });
    if(best&&best.score>0)bestPerMatchup.push(best);
  });

  // Sort by score descending
  bestPerMatchup.sort((a,b)=>b.score-a.score);

  // Take top N*K picks
  const needed=numBets*legsPerBet;
  const selected=bestPerMatchup.slice(0,needed);

  // Group into parlays sequentially (best K → parlay 1, next K → parlay 2...)
  const parlays=[];
  for(let i=0;i<numBets;i++){
    const legs=selected.slice(i*legsPerBet,(i+1)*legsPerBet);
    if(legs.length===legsPerBet){
      // Calculate combined min odds (multiply)
      const combinedMinOdds=legs.reduce((acc,l)=>acc*(l.bestMinOdds||1),1);
      parlays.push({legs,combinedMinOdds});
    }
  }
  return{parlays,totalAvailable:bestPerMatchup.length};
}

// ─── Odds API (the-odds-api.com) ───
function findLegOdds(leg,gamesOdds){
  if(!gamesOdds||!gamesOdds.length)return null;
  const m=leg.matchup;
  const bt=leg.bt;
  const btKey=leg.btKey;

  // Match game by exact English team names
  const game=gamesOdds.find(g=>g.home_team===m.home&&g.away_team===m.away);
  if(!game)return null;

  // Determine which market + outcome to look for
  let marketKey,matchName,matchPoint=null;
  if(btKey==="ml"){
    marketKey="h2h";
    matchName=bt.predicted==="home"?m.home:m.away;
  }else if(btKey.startsWith("spread_")){
    marketKey="spreads";
    matchPoint=parseFloat(btKey.split("_")[1]);
    matchName=bt.predicted==="home"?m.home:m.away;
  }else if(btKey.startsWith("total_")){
    marketKey="totals";
    matchPoint=parseFloat(btKey.split("_")[1]);
    matchName=bt.predicted==="over"?"Over":"Under";
  }else return null;

  // Collect all matching prices from all bookmakers
  const prices=[];
  for(const book of game.bookmakers||[]){
    const market=book.markets?.find(mk=>mk.key===marketKey);
    if(!market)continue;
    for(const oc of market.outcomes||[]){
      if(oc.name!==matchName)continue;
      if(matchPoint!==null&&Math.abs((oc.point??999)-matchPoint)>0.01&&Math.abs(Math.abs(oc.point??999)-matchPoint)>0.01)continue;
      prices.push({book:book.key,price:oc.price});
    }
  }
  if(!prices.length)return null;

  const avg=prices.reduce((a,p)=>a+p.price,0)/prices.length;
  const best=Math.max(...prices.map(p=>p.price));
  return{avg,best,count:prices.length,commence:game.commence_time};
}

        執行 <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>python -X utf8 mlb_analyzer.py daily</span> 後，把 <span style={{color:C.acc}}>mlb_analysis.json</span> 內容貼到下方
      </div>
      <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder="貼上 mlb_analysis.json 內容..." style={{width:"100%",minHeight:120,padding:10,borderRadius:8,border:`1px solid ${C.bd}`,background:C.bg,color:C.t,fontSize:12,fontFamily:"'JetBrains Mono',monospace",outline:"none",boxSizing:"border-box",resize:"vertical"}}/>
      {err&&<div style={{fontSize:11,color:C.r,marginTop:6}}>{err}</div>}
      <button onClick={loadJson} disabled={!input.trim()||saving} style={{width:"100%",padding:10,borderRadius:8,border:"none",fontSize:13,fontWeight:700,background:input.trim()&&!saving?C.acc:C.m,color:input.trim()&&!saving?"#000":C.d,cursor:input.trim()&&!saving?"pointer":"default",outline:"none",marginTop:10}}>{saving?"儲存中...":"載入並同步到雲端"}</button>
    </div>}

    {data&&<>
      <div style={{fontSize:11,color:C.d,marginBottom:12,padding:"8px 12px",background:C.card,borderRadius:8,border:`1px solid ${C.bd}`}}>
        資料日期：<span style={{color:C.t}}>{data.date||"—"}</span>
        {baseline?.season_range&&<> · 賽季：<span style={{color:C.t}}>{baseline.season_range}</span></>}
        · 樣本：<span style={{color:C.t}}>{baseline?.total_games_analyzed?.toLocaleString()||data.current_season_games||"—"}</span> 場
      </div>

      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        <Pill sel={sub==="matchups"} onClick={()=>setSub("matchups")}>今日分析</Pill>
        <Pill sel={sub==="indicators"} onClick={()=>setSub("indicators")}>指標驗證</Pill>
        <Pill sel={sub==="filters"} onClick={()=>setSub("filters")}>可獲利篩選</Pill>
        <Pill sel={sub==="recommend"} onClick={()=>setSub("recommend")}>組合推薦</Pill>
      </div>

      {sub==="matchups"&&<div>
        {sortedMatchups.length===0?<div style={{textAlign:"center",padding:40,color:C.d}}>無今日比賽資料</div>:
        sortedMatchups.map((m,i)=><MatchupCardV3 key={i} m={m}/>)}
      </div>}

      {sub==="indicators"&&<div>
        <div style={{fontSize:11,color:C.d,marginBottom:10,padding:"8px 12px",background:C.card,borderRadius:8,border:`1px solid ${C.bd}`}}>
          深綠 ≥56% 強信號　·　淺綠 54-56% 有效　·　灰 52-54% 微弱　·　黃 50-52% 持平　·　紅 {"<"}50% 反向
        </div>
        <BetTypeSelector value={indBt} onChange={setIndBt}/>
        {btData?<IndicatorRanking ranking={btData.indicator_ranking} btKey={indBt}/>:<div style={{textAlign:"center",padding:30,color:C.d,fontSize:12}}>該盤口無資料</div>}
      </div>}

      {sub==="filters"&&<div>
        <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bd}`,marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:C.acc,marginBottom:8}}>💡 使用方法</div>
          <div style={{fontSize:12,color:C.d,lineHeight:1.6}}>
            1. 每天跑 daily 後，檢視「今日分析」找符合這些篩選的場次<br/>
            2. 兩腳合計賠率必須超過「損益平衡賠率」才有正期望值<br/>
            3. Top% 10 樣本少可靠度最高，Top% 30 則較寬鬆
          </div>
        </div>
        <BetTypeSelector value={filterBt} onChange={setFilterBt} countMap={filterCounts}/>
        {filterBtData?<ProfitableFiltersTable filters={filterBtData.profitable_filters}/>:<div style={{textAlign:"center",padding:30,color:C.d,fontSize:12}}>該盤口無資料</div>}
        <div style={{fontSize:11,color:C.m,padding:"12px 4px",textAlign:"center",lineHeight:1.6}}>
          📊 數據樣本：{baseline?.total_games_analyzed?.toLocaleString()||"—"} 場{baseline?.season_range?` (${baseline.season_range})`:""}<br/>
          🔄 上次更新：{data.generated_at||"—"}<br/>
          ⚠️ 樣本 {"<"} 1,000 的篩選可靠度較低，台彩大小分賠率通常低於損益平衡，實戰以 ML 和讓分 1.5 為主
        </div>
      </div>}

      {sub==="recommend"&&<RecommendPanel matchups={sortedMatchups} uid={uid}/>}
    </>}
  </div>;
}

// ═══════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════
function App(){
  const[user,setUser]=useState(undefined); // undefined=loading, null=logged out
  const[tab,setTab]=useState("add");
  const[migrated,setMigrated]=useState(false);

  // Auth listener
  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(u=>setUser(u||null));
    return()=>unsub();
  },[]);

  const uid=user?.uid;
  const betsStore=useFirestore(uid,"bets","mlb-b4","createdAt");
  const gamesStore=useFirestore(uid,"games","mlb-g4","date");
  const bets=betsStore.data;
  const games=gamesStore.data;

  // One-time migration: upload localStorage data to Firestore
  useEffect(()=>{
    if(!uid||migrated)return;
    const localBets=load("mlb-b4",[]);
    const localGames=load("mlb-g4",[]);
    (async()=>{
      // Only migrate if Firestore is empty and localStorage has data
      const bSnap=await userDoc(uid,"bets").limit(1).get();
      if(bSnap.empty&&localBets.length){
        for(const b of localBets){const{id,...rest}=b;if(!rest.createdAt)rest.createdAt=new Date().toISOString();await userDoc(uid,"bets").doc(id).set(rest)}
      }
      const gSnap=await userDoc(uid,"games").limit(1).get();
      if(gSnap.empty&&localGames.length){
        for(const g of localGames){const{id,...rest}=g;if(!rest.createdAt)rest.createdAt=new Date().toISOString();await userDoc(uid,"games").doc(id).set(rest)}
      }
      setMigrated(true);
    })();
  },[uid]);

  // Sync game scores into matching bet legs (supports single game or array)
  const syncBetsWithGames=useCallback(async(gameOrGames)=>{
    const gamesToSync=Array.isArray(gameOrGames)?gameOrGames:[gameOrGames];
    const snap=await userDoc(uid,"bets").get();
    for(const doc of snap.docs){
      const b={id:doc.id,...doc.data()};
      let changed=false;
      const nl=b.legs.map(l=>{
        for(const game of gamesToSync){
          if(l.date===game.date&&l.away===game.away&&l.home===game.home){
            const u={...l,homeScore:String(game.homeScore),awayScore:String(game.awayScore)};
            u.result=determineResult(u,u.homeScore,u.awayScore);
            changed=true;return u;
          }
        }
        return l;
      });
      if(changed)await userDoc(uid,"bets").doc(doc.id).update({legs:nl});
    }
  },[uid]);

  const addBet=async b=>{await betsStore.add(b)};
  const upBet=(id,fn)=>{
    const bet=bets.find(b=>b.id===id);
    if(!bet)return;
    const updated=fn(bet);
    betsStore.update(id,updated);
  };
  const delBet=id=>betsStore.remove(id);
  const addGame=async g=>{
    await gamesStore.add(g);
    await syncBetsWithGames(g);
  };
  const addGames=async gs=>{
    for(const g of gs)await gamesStore.add(g);
    await syncBetsWithGames(gs);
  };
  const upGame=async(id,updated)=>{
    await gamesStore.update(id,updated);
    await syncBetsWithGames(updated);
  };
  const delGame=id=>gamesStore.remove(id);

  const signIn=()=>auth.signInWithPopup(googleProvider).catch(e=>{
    // Fallback to redirect for mobile browsers that block popups
    if(e.code==="auth/popup-blocked"||e.code==="auth/cancelled-popup-request")auth.signInWithRedirect(googleProvider);
    else alert("登入失敗："+e.message);
  });
  const signOut=()=>auth.signOut();

  // Loading state
  if(user===undefined)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.d}}>
    <div style={{textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>⚾</div><div>載入中...</div></div>
  </div>;

  // Login screen
  if(!user)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.t}}>
    <div style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:60,marginBottom:16}}>⚾</div>
      <div style={{fontSize:22,fontWeight:700,marginBottom:6}}>MLB 投注追蹤</div>
      <div style={{fontSize:13,color:C.d,marginBottom:32}}>台灣運彩 · 賽果分析</div>
      <button onClick={signIn} style={{padding:"12px 32px",borderRadius:10,border:`1px solid ${C.bd}`,background:C.card,color:C.t,fontSize:15,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:10,margin:"0 auto",outline:"none"}}>
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 000 24c0 3.77.9 7.35 2.56 10.56l7.97-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
        使用 Google 登入
      </button>
      <div style={{fontSize:11,color:C.m,marginTop:16}}>登入後資料自動跨裝置同步</div>
    </div>
  </div>;

  const tabs=[
    {id:"add",icon:"＋",label:"投注"},
    {id:"hist",icon:"📋",label:"紀錄"},
    {id:"results",icon:"⚾",label:"賽果"},
    {id:"stats",icon:"📈",label:"統計"},
    {id:"analysis",icon:"🔬",label:"分析"},
  ];

  return<div style={{background:C.bg,minHeight:"100vh",color:C.t,paddingBottom:80}}>
    <div style={{background:C.sf,borderBottom:`1px solid ${C.bd}`,padding:"14px 20px",display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:22}}>⚾</span>
      <div style={{flex:1}}><div style={{fontSize:17,fontWeight:700}}>MLB 投注追蹤</div><div style={{fontSize:11,color:C.d}}>台灣運彩 · 賽果分析</div></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {user.photoURL&&<img src={user.photoURL} style={{width:24,height:24,borderRadius:"50%"}} referrerPolicy="no-referrer"/>}
        <button onClick={signOut} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:11}}>登出</button>
      </div>
    </div>
    <div style={{maxWidth:560,margin:"0 auto",padding:"12px 16px"}}>
      {tab==="add"&&<AddBetView addBet={addBet}/>}
      {tab==="hist"&&<HistView bets={bets} updateBet={upBet} deleteBet={delBet}/>}
      {tab==="results"&&<ResultsView games={games} addGames={addGames} updateGame={upGame} deleteGame={delGame}/>}
      {tab==="stats"&&<StatsView bets={bets} games={games}/>}
      {tab==="analysis"&&<AnalysisView uid={uid}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.sf,borderTop:`1px solid ${C.bd}`,display:"flex",zIndex:10}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",color:tab===t.id?C.acc:C.d,display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:tab===t.id?`2px solid ${C.acc}`:"2px solid transparent",outline:"none"}}>
        <span style={{fontSize:18}}>{t.icon}</span><span style={{fontSize:11,fontWeight:tab===t.id?700:400}}>{t.label}</span>
      </button>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
