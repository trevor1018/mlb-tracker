// ─── Main Analysis View ───
function AnalysisView({uid,recoState,setRecoState}){
  const[data,setData]=useState(()=>load("mlb-analysis",null));
  const[sub,setSub]=useState("matchups");
  const[input,setInput]=useState("");
  const[err,setErr]=useState("");
  const[indBt,setIndBt]=useState("ml");
  const[filterBt,setFilterBt]=useState("ml");
  const[saving,setSaving]=useState(false);

  // Subscribe to Firestore for realtime sync across devices
  useEffect(()=>{
    if(!uid)return;
    const ref=db.collection("users").doc(uid).collection("meta").doc("analysis");
    const unsub=ref.onSnapshot(snap=>{
      if(snap.exists){
        const json=snap.data().json;
        if(json){
          try{
            const parsed=JSON.parse(json);
            setData(parsed);
            save("mlb-analysis",parsed);
          }catch(e){console.error("Failed to parse analysis JSON from Firestore:",e)}
        }
      }else{
        // Doc was deleted on another device → clear local
        setData(null);
        save("mlb-analysis",null);
      }
    },err=>console.error("Analysis listen error:",err));
    return()=>unsub();
  },[uid]);

  const loadJson=async()=>{
    try{
      const parsed=JSON.parse(input);
      setSaving(true);
      setData(parsed);
      save("mlb-analysis",parsed);
      if(uid){
        await db.collection("users").doc(uid).collection("meta").doc("analysis").set({
          json:input,
          updatedAt:new Date().toISOString()
        });
      }
      setInput("");setErr("");
    }catch(e){setErr("JSON 格式錯誤或儲存失敗："+e.message)}
    setSaving(false);
  };
  const clearData=async()=>{
    if(!confirm("確定清除已載入的分析資料？所有裝置都會同步清除。"))return;
    setData(null);save("mlb-analysis",null);
    setRecoState({numBets:"3",legsPerBet:"2",result:null,oddsData:null,oddsTime:null});
    save("reco-numBets","3");save("reco-legs","2");
    if(uid){
      try{await db.collection("users").doc(uid).collection("meta").doc("analysis").delete()}
      catch(e){console.error("Clear analysis error:",e)}
    }
  };

  // Sort matchups: Top 5% first, then Top 10%, then by edge gap
  const sortedMatchups=useMemo(()=>{
    const list=data?.today_matchups||data?.matchups||[];
    const topRank=m=>{
      const bts=Object.values(m.bet_types||{});
      if(m.any_top_5_pct||bts.some(b=>b.is_top_5_pct))return 2;
      if(m.any_top_10_pct)return 1;
      return 0;
    };
    return[...list].sort((a,b)=>{
      const at=topRank(a);
      const bt=topRank(b);
      if(at!==bt)return bt-at;
      const da=Math.abs((a.away_edges||0)-(a.home_edges||0));
      const db=Math.abs((b.away_edges||0)-(b.home_edges||0));
      return db-da;
    });
  },[data]);

  // Build profitable filter counts per bet type
  const filterCounts=useMemo(()=>{
    const m={};
    if(data?.baseline?.bet_types){
      Object.entries(data.baseline.bet_types).forEach(([k,v])=>{m[k]=(v.profitable_filters||[]).length});
    }
    return m;
  },[data]);

  const baseline=data?.baseline;
  const btData=baseline?.bet_types?.[indBt];
  const filterBtData=baseline?.bet_types?.[filterBt];

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:16,fontWeight:700}}>進階分析</div>
      {data&&<button onClick={clearData} style={{background:"none",border:"none",color:C.m,cursor:"pointer",fontSize:11}}>清除資料</button>}
    </div>

    {!data&&<div style={{background:C.card,borderRadius:10,padding:16,border:`1px solid ${C.bd}`,marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>載入分析資料</div>
      <div style={{fontSize:11,color:C.d,marginBottom:10}}>
        執行 <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>python -X utf8 mlb_analyzer.py daily</span> 後，把 <span style={{color:C.acc}}>mlb_analysis.json</span> 內容貼到下方
      </div>
      <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder="貼上 mlb_analysis.json 內容..." style={{width:"100%",minHeight:120,padding:10,borderRadius:8,border:`1px solid ${C.bd}`,background:C.bg,color:C.t,fontSize:12,fontFamily:"'JetBrains Mono',monospace",outline:"none",boxSizing:"border-box",resize:"vertical"}}/>
      {err&&<div style={{fontSize:11,color:C.r,marginTop:6}}>{err}</div>}
      <button onClick={loadJson} disabled={!input.trim()||saving} style={{width:"100%",padding:10,borderRadius:8,border:"none",fontSize:13,fontWeight:700,background:input.trim()&&!saving?C.acc:C.m,color:input.trim()&&!saving?"#000":C.d,cursor:input.trim()&&!saving?"pointer":"default",outline:"none",marginTop:10}}>{saving?"儲存中...":"載入並同步到雲端"}</button>
    </div>}

    {data&&<>
      <div style={{fontSize:11,color:C.d,marginBottom:12,padding:"8px 12px",background:C.card,borderRadius:8,border:`1px solid ${C.bd}`}}>
        資料日期：<span style={{color:C.t}}>{data.date||"—"}</span>
        {baseline?.season_range&&<> · 賽季：<span style={{color:C.t}}>{baseline.season_range}</span></>}
        · 樣本：<span style={{color:C.t}}>{baseline?.total_games_analyzed?.toLocaleString()||data.current_season_games||"—"}</span> 場
      </div>

      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        <Pill sel={sub==="matchups"} onClick={()=>setSub("matchups")}>今日分析</Pill>
        <Pill sel={sub==="indicators"} onClick={()=>setSub("indicators")}>指標驗證</Pill>
        <Pill sel={sub==="filters"} onClick={()=>setSub("filters")}>可獲利篩選</Pill>
        <Pill sel={sub==="recommend"} onClick={()=>setSub("recommend")}>組合推薦</Pill>
      </div>

      {sub==="matchups"&&<div>
        {sortedMatchups.length===0?<div style={{textAlign:"center",padding:40,color:C.d}}>無今日比賽資料</div>:
        sortedMatchups.map((m,i)=><MatchupCardV3 key={i} m={m}/>)}
      </div>}

      {sub==="indicators"&&<div>
        <div style={{fontSize:11,color:C.d,marginBottom:10,padding:"8px 12px",background:C.card,borderRadius:8,border:`1px solid ${C.bd}`}}>
          深綠 ≥56% 強信號　·　淺綠 54-56% 有效　·　灰 52-54% 微弱　·　黃 50-52% 持平　·　紅 {"<"}50% 反向
        </div>
        <BetTypeSelector value={indBt} onChange={setIndBt}/>
        {btData?<IndicatorRanking ranking={btData.indicator_ranking} btKey={indBt}/>:<div style={{textAlign:"center",padding:30,color:C.d,fontSize:12}}>該盤口無資料</div>}
      </div>}

      {sub==="filters"&&<div>
        <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bd}`,marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:C.acc,marginBottom:8}}>💡 使用方法</div>
          <div style={{fontSize:12,color:C.d,lineHeight:1.6}}>
            1. 每天跑 daily 後，檢視「今日分析」找符合這些篩選的場次<br/>
            2. 兩腳合計賠率必須超過「損益平衡賠率」才有正期望值<br/>
            3. Top% 10 樣本少可靠度最高，Top% 30 則較寬鬆
          </div>
        </div>
        <BetTypeSelector value={filterBt} onChange={setFilterBt} countMap={filterCounts}/>
        {filterBtData?<ProfitableFiltersTable filters={filterBtData.profitable_filters}/>:<div style={{textAlign:"center",padding:30,color:C.d,fontSize:12}}>該盤口無資料</div>}
        <div style={{fontSize:11,color:C.m,padding:"12px 4px",textAlign:"center",lineHeight:1.6}}>
          📊 數據樣本：{baseline?.total_games_analyzed?.toLocaleString()||"—"} 場{baseline?.season_range?` (${baseline.season_range})`:""}<br/>
          🔄 上次更新：{data.generated_at||"—"}<br/>
          ⚠️ 樣本 {"<"} 1,000 的篩選可靠度較低，台彩大小分賠率通常低於損益平衡，實戰以 ML 和讓分 1.5 為主
        </div>
      </div>}

      {sub==="recommend"&&<RecommendPanel matchups={sortedMatchups} uid={uid} state={recoState} setState={setRecoState}/>}
    </>}
  </div>;
}

// MAIN APP
// ═══════════════════════════════════════
function App(){
  const[user,setUser]=useState(undefined); // undefined=loading, null=logged out
  const[tab,setTab]=useState("add");
  const[migrated,setMigrated]=useState(false);

  // Recommend state lifted to App so it survives tab switching
  const[recoState,setRecoState]=useState({
    numBets:String(load("reco-numBets","3")),
    legsPerBet:String(load("reco-legs","2")),
    result:null,
    oddsData:null,
    oddsTime:null
  });

  // Auth listener
  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(u=>setUser(u||null));
    return()=>unsub();
  },[]);

  const uid=user?.uid;
  const betsStore=useFirestore(uid,"bets","mlb-b4","createdAt");
  const gamesStore=useFirestore(uid,"games","mlb-g4","date");
  const bets=betsStore.data;
  const games=gamesStore.data;

  // One-time migration: upload localStorage data to Firestore
  useEffect(()=>{
    if(!uid||migrated)return;
    const localBets=load("mlb-b4",[]);
    const localGames=load("mlb-g4",[]);
    (async()=>{
      // Only migrate if Firestore is empty and localStorage has data
      const bSnap=await userDoc(uid,"bets").limit(1).get();
      if(bSnap.empty&&localBets.length){
        for(const b of localBets){const{id,...rest}=b;if(!rest.createdAt)rest.createdAt=new Date().toISOString();await userDoc(uid,"bets").doc(id).set(rest)}
      }
      const gSnap=await userDoc(uid,"games").limit(1).get();
      if(gSnap.empty&&localGames.length){
        for(const g of localGames){const{id,...rest}=g;if(!rest.createdAt)rest.createdAt=new Date().toISOString();await userDoc(uid,"games").doc(id).set(rest)}
      }
      setMigrated(true);
    })();
  },[uid]);

  // Sync game scores into matching bet legs (supports single game or array)
  const syncBetsWithGames=useCallback(async(gameOrGames)=>{
    const gamesToSync=Array.isArray(gameOrGames)?gameOrGames:[gameOrGames];
    const snap=await userDoc(uid,"bets").get();
    for(const doc of snap.docs){
      const b={id:doc.id,...doc.data()};
      let changed=false;
      const nl=b.legs.map(l=>{
        for(const game of gamesToSync){
          if(l.date===game.date&&l.away===game.away&&l.home===game.home){
            const u={...l,homeScore:String(game.homeScore),awayScore:String(game.awayScore)};
            u.result=determineResult(u,u.homeScore,u.awayScore);
            changed=true;return u;
          }
        }
        return l;
      });
      if(changed)await userDoc(uid,"bets").doc(doc.id).update({legs:nl});
    }
  },[uid]);

  const addBet=async b=>{await betsStore.add(b)};
  const upBet=(id,fn)=>{
    const bet=bets.find(b=>b.id===id);
    if(!bet)return;
    const updated=fn(bet);
    betsStore.update(id,updated);
  };
  const delBet=id=>betsStore.remove(id);
  const addGame=async g=>{
    await gamesStore.add(g);
    await syncBetsWithGames(g);
  };
  const addGames=async gs=>{
    for(const g of gs)await gamesStore.add(g);
    await syncBetsWithGames(gs);
  };
  const upGame=async(id,updated)=>{
    await gamesStore.update(id,updated);
    await syncBetsWithGames(updated);
  };
  const delGame=id=>gamesStore.remove(id);

  const signIn=()=>auth.signInWithPopup(googleProvider).catch(e=>{
    // Fallback to redirect for mobile browsers that block popups
    if(e.code==="auth/popup-blocked"||e.code==="auth/cancelled-popup-request")auth.signInWithRedirect(googleProvider);
    else alert("登入失敗："+e.message);
  });
  const signOut=()=>auth.signOut();

  // Loading state
  if(user===undefined)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.d}}>
    <div style={{textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>⚾</div><div>載入中...</div></div>
  </div>;

  // Login screen
  if(!user)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.t}}>
    <div style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:60,marginBottom:16}}>⚾</div>
      <div style={{fontSize:22,fontWeight:700,marginBottom:6}}>MLB 投注追蹤</div>
      <div style={{fontSize:13,color:C.d,marginBottom:32}}>台灣運彩 · 賽果分析</div>
      <button onClick={signIn} style={{padding:"12px 32px",borderRadius:10,border:`1px solid ${C.bd}`,background:C.card,color:C.t,fontSize:15,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:10,margin:"0 auto",outline:"none"}}>
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 000 24c0 3.77.9 7.35 2.56 10.56l7.97-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
        使用 Google 登入
      </button>
      <div style={{fontSize:11,color:C.m,marginTop:16}}>登入後資料自動跨裝置同步</div>
    </div>
  </div>;

  const tabs=[
    {id:"add",icon:"＋",label:"投注"},
    {id:"hist",icon:"📋",label:"紀錄"},
    {id:"results",icon:"⚾",label:"賽果"},
    {id:"analysis",icon:"🔬",label:"分析"},
    {id:"stats",icon:"📈",label:"統計"},
  ];

  return<div style={{background:C.bg,minHeight:"100vh",color:C.t,paddingBottom:80}}>
    <div style={{background:C.sf,borderBottom:`1px solid ${C.bd}`,padding:"14px 20px",display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:22}}>⚾</span>
      <div style={{flex:1}}><div style={{fontSize:17,fontWeight:700}}>MLB 投注追蹤</div><div style={{fontSize:11,color:C.d}}>台灣運彩 · 賽果分析</div></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {user.photoURL&&<img src={user.photoURL} style={{width:24,height:24,borderRadius:"50%"}} referrerPolicy="no-referrer"/>}
        <button onClick={signOut} style={{background:"none",border:"none",color:C.d,cursor:"pointer",fontSize:11}}>登出</button>
      </div>
    </div>
    <div style={{maxWidth:560,margin:"0 auto",padding:"12px 16px"}}>
      {tab==="add"&&<AddBetView addBet={addBet} uid={uid}/>}
      {tab==="hist"&&<HistView bets={bets} updateBet={upBet} deleteBet={delBet}/>}
      {tab==="results"&&<ResultsView games={games} addGames={addGames} updateGame={upGame} deleteGame={delGame}/>}
      {tab==="stats"&&<StatsView bets={bets} games={games}/>}
      {tab==="analysis"&&<AnalysisView uid={uid} recoState={recoState} setRecoState={setRecoState}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.sf,borderTop:`1px solid ${C.bd}`,display:"flex",zIndex:10}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",color:tab===t.id?C.acc:C.d,display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:tab===t.id?`2px solid ${C.acc}`:"2px solid transparent",outline:"none"}}>
        <span style={{fontSize:18}}>{t.icon}</span><span style={{fontSize:11,fontWeight:tab===t.id?700:400}}>{t.label}</span>
      </button>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
